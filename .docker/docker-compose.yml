services:
  # s3fs - minimal S3-compatible server backed by local filesystem
  # Replaces s3proxy + toxiproxy with a single service.
  # S3FS_LATENCY adds artificial per-request latency (replaces toxiproxy).
  # Production S3 latency baseline: 36ms average GET latency measured on
  # Grafana Cloud Tempo queriers (tempodb_backend_request_duration_seconds,
  # operation=GET status_code=206) on 2026-03-24.
  s3fs:
    build:
      context: ../../s3fs
      dockerfile: Dockerfile
    user: "1000:1000"
    environment:
      S3FS_ROOT: /data
      S3FS_PORT: "8080"
      S3FS_LATENCY: "${S3FS_LATENCY:-36}"
    volumes:
      - ./s3-data:/data
    networks:
      - tempo-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Create S3 buckets
  s3fs-init:
    image: curlimages/curl:latest
    depends_on:
      s3fs:
        condition: service_healthy
    command: >
      sh -c "
      curl -s -X PUT http://s3fs:8080/tempo-parquet;
      curl -s -X PUT http://s3fs:8080/tempo-blockpack;
      echo done
      "
    networks:
      - tempo-network

  # Kafka for Tempo ingest path
  kafka:
    image: apache/kafka:latest
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 1
      KAFKA_MESSAGE_MAX_BYTES: 10485760        # 10 MiB — matches forwarder default 3 MiB batch
      KAFKA_REPLICA_FETCH_MAX_BYTES: 10485760  # must be >= MESSAGE_MAX_BYTES
    ports:
      - "19092:9092"
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-broker-api-versions.sh", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - tempo-network

  # Tempo with Parquet backend (built from blockpack-integration)
  tempo-parquet:
    build:
      context: ..
      dockerfile: .docker/Dockerfile.tempo
      args:
        BINARY_NAME: tempo-parquet
    command:
      - "-config.file=/etc/tempo.yaml"
    depends_on:
      s3fs-init:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
    volumes:
      - ./tempo-parquet.yaml:/etc/tempo.yaml
      - tempo-parquet-data:/var/tempo
    ports:
      - "13200:3200"   # Tempo HTTP
      - "14317:4317"   # OTLP gRPC
      - "14318:4318"   # OTLP HTTP
    environment:
      - GOGC=80
      - GOMEMLIMIT=10GiB
    networks:
      - tempo-network

  # Tempo with Blockpack backend (built from blockpack-integration with vBlockpack support)
  tempo-blockpack:
    hostname: block-builder-0
    build:
      context: ..
      dockerfile: .docker/Dockerfile.tempo
      args:
        BINARY_NAME: tempo-blockpack
    command:
      - "-config.file=/etc/tempo.yaml"
    depends_on:
      s3fs-init:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
      embed-server:
        condition: service_healthy
    volumes:
      - ./tempo-blockpack.yaml:/etc/tempo.yaml
      - tempo-blockpack-data:/var/tempo
    ports:
      - "13201:3201"   # Tempo HTTP
      - "14319:4319"   # OTLP gRPC
      - "14320:4320"   # OTLP HTTP
    environment:
      - GOMEMLIMIT=20GiB
    networks:
      - tempo-network

  # HuggingFace Text Embeddings Inference for blockpack vector search
  embed-server:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-latest
    command: --model-id nomic-ai/nomic-embed-text-v1.5 --port 80
    environment:
      HF_HOME: /data
    volumes:
      - tei-models:/data
    ports:
      - "18765:80"
    networks:
      - tempo-network
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:80/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 120s

  # otel-loadgen for Parquet Tempo
  otel-loadgen-parquet:
    image: streamfold/otel-loadgen:latest
    profiles: [loadgen]
    restart: unless-stopped
    command:
      - gen
      - traces
      - --otlp-endpoint=tempo-parquet:4317
      - --workers=10
      - --spans-per-resource=100
      - --duration=24h
    depends_on:
      - tempo-parquet
    networks:
      - tempo-network

  # otel-loadgen for Blockpack Tempo
  otel-loadgen-blockpack:
    image: streamfold/otel-loadgen:latest
    profiles: [loadgen]
    restart: unless-stopped
    command:
      - gen
      - traces
      - --otlp-endpoint=tempo-blockpack:4319
      - --workers=10
      - --spans-per-resource=100
      - --duration=24h
    depends_on:
      - tempo-blockpack
    networks:
      - tempo-network

  # Prometheus for metrics
  prometheus:
    image: prom/prometheus:latest
    command:
      - --config.file=/etc/prometheus.yaml
      - --web.enable-remote-write-receiver
      - --enable-feature=expand-external-labels
    env_file:
      - .env
    environment:
      - GRAFANA_PROM_URL
      - GRAFANA_PROM_USER
      - GRAFANA_PROM_TOKEN
    volumes:
      - ./prometheus.yaml:/etc/prometheus.yaml
    ports:
      - "19090:9090"
    depends_on:
      - tempo-parquet
      - tempo-blockpack
    networks:
      - tempo-network

  # Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    volumes:
      - ./grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml
      - ./grafana-dashboards.yaml:/etc/grafana/provisioning/dashboards/dashboards.yaml
      - ./dashboards:/etc/grafana/provisioning/dashboards
    ports:
      - "13000:3000"
    depends_on:
      - prometheus
    networks:
      - tempo-network

networks:
  tempo-network:
    driver: bridge

volumes:
  tempo-parquet-data:
  tempo-blockpack-data:
  tei-models:
