cache:
    caches:
        - memcached:
            consistent_hash: true
            host: memcached-01
            max_idle_conns: 100
            max_item_size: 5.24288e+06
            service: memcached-client
            timeout: 200ms
          roles:
            - bloom
        - memcached:
            consistent_hash: true
            host: memcached-01
            max_idle_conns: 100
            max_item_size: 5.24288e+06
            service: memcached-client
            timeout: 200ms
          roles:
            - trace-id-index
        - memcached:
            consistent_hash: true
            host: memcached-01
            max_idle_conns: 100
            max_item_size: 5.24288e+06
            service: memcached-client
            timeout: 200ms
          roles:
            - parquet-footer
        - memcached:
            consistent_hash: true
            host: memcached-frontend-search-01
            max_idle_conns: 100
            max_item_size: 1.048576e+06
            service: memcached-client
            timeout: 50ms
          roles:
            - frontend-search
        - memcached:
            consistent_hash: true
            host: memcached-parquet-page-01
            max_idle_conns: 100
            max_item_size: 2.097152e+06
            service: memcached-client
            timeout: 200ms
          roles:
            - parquet-page
distributor:
    forwarders:
        - backend: otlpgrpc
          filter:
            traces:
                span:
                    - IsMatch(trace_id.string, "^dc07.*") == false
          name: k6-cloud-insights-staging
          otlpgrpc:
            endpoints:
                - forwarder.k6-cloud-insights-staging.svc.cluster.local:4317
            tls:
                insecure: true
http_api_prefix: /tempo
memberlist:
    abort_if_cluster_join_fails: false
    bind_port: 7946
    cluster_label: dev-us-east-0.tempo-dev-test-03
    join_members:
        - dns+gossip-ring.tempo-dev-test-03.svc.cluster.local.:7946
memory:
    automemlimit_enabled: true
multitenancy_enabled: true
overrides:
    enable_legacy_overrides: true
    ingestion_burst_size_bytes: 2e+07
    ingestion_rate_limit_bytes: 500000
    ingestion_rate_strategy: global
    metrics_generator_native_histogram_max_bucket_number: 60
    per_tenant_override_config: /overrides/overrides.yaml
    user_configurable_overrides:
        client:
            azure:
                container_name: dev-us-east-0-tempo-dev-test-03-config
            backend: s3
            gcs:
                bucket_name: dev-us-east-0-tempo-dev-test-03-config
            s3:
                bucket: dev-us-east-0-tempo-dev-test-03-config
                endpoint: s3.dualstack.us-east-2.amazonaws.com
        enabled: true
        poll_interval: 5m
query_frontend:
    allowed_headers:
        - Recent-Data-Target
        - x-plugin-id
    log_query_request_headers: x-plugin-id
    max_batch_size: 7
    max_outstanding_per_tenant: 2000
    mcp_server:
        enabled: true
    metrics:
        duration_slo: 10s
        max_duration: 25h
        max_response_series: 10000
        throughput_bytes_slo: 1.073741824e+09
    query_end_cutoff: 30s
    rf1_after: "2025-12-31T00:00:00Z"
    search:
        concurrent_jobs: 1000
        duration_slo: 5s
        max_duration: 720h
        max_result_limit: 1000
        metadata_slo:
            duration_slo: 5s
            throughput_bytes_slo: 1.073741824e+09
        target_bytes_per_job: 2e+08
        throughput_bytes_slo: 1.073741824e+09
    trace_by_id:
        duration_slo: 5s
        external_enabled: true
        query_shards: 100
server:
    grpc_server_max_recv_msg_size: 1.34217728e+08
    grpc_server_max_send_msg_size: 1.34217728e+08
    http_listen_port: 3100
    http_server_read_timeout: 300s
    http_server_write_timeout: 300s
shutdown_delay: 300s
storage:
    trace:
        azure:
            container_name: dev-us-east-0-tempo-dev-test-03
        backend: s3
        block:
            version: vblockpack
        blocklist_poll: "0"
        blocklist_poll_tenant_concurrency: 1
        blocklist_poll_tenant_index_builders: 1
        cache: ""
        empty_tenant_deletion_age: 24h
        empty_tenant_deletion_enabled: true
        gcs:
            bucket_name: dev-us-east-0-tempo-dev-test-03
            chunk_buffer_size: 1.048576e+07
        memcached: {}
        pool:
            queue_depth: 2000
        s3:
            bucket: dev-us-east-0-tempo-dev-test-03
            endpoint: s3.dualstack.us-east-2.amazonaws.com
            list_blocks_concurrency: 30
        wal:
            path: /var/tempo/wal
stream_over_http_enabled: true
