<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Block Format — Blockpack Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,'Segoe UI',sans-serif;background:#0F172A;color:#E2E8F0;overflow:hidden;height:100vh}

/* Top bar */
.bar{height:48px;background:#1E293B;border-bottom:1px solid #334155;display:flex;align-items:center;padding:0 24px;gap:16px}
.bar a{color:#94A3B8;text-decoration:none;font-size:13px;transition:color .15s}
.bar a:hover{color:#E2E8F0}
.bar .title{color:#F8FAFC;font-weight:700;font-size:15px;flex:1}
.bar .query-text{font-family:'Menlo','Consolas',monospace;font-size:12px;color:#93C5FD;background:#0F172A;padding:4px 12px;border-radius:6px;border:1px solid #334155;max-width:600px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar kbd{font-size:11px;color:#64748B;background:#0F172A;padding:2px 6px;border-radius:4px;border:1px solid #334155;font-family:inherit}

/* Main layout */
.main{display:flex;height:calc(100vh - 48px)}

/* Stages panel */
.stages{width:280px;background:#1E293B;border-right:1px solid #334155;display:flex;flex-direction:column}
.stages-title{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#64748B;padding:16px 20px 8px}
.stages-list{flex:1;overflow-y:auto;padding:0 0 12px}

.stage{display:flex;align-items:flex-start;gap:12px;padding:10px 20px;cursor:pointer;transition:background .2s;position:relative}
.stage:hover{background:#253347}
.stage.active{background:#1E3A5F}
.stage.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:#3B82F6;border-radius:0 2px 2px 0}

.stage-dot{width:28px;height:28px;border-radius:50%;background:#334155;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#94A3B8;flex-shrink:0;transition:all .3s}
.stage.active .stage-dot{background:#3B82F6;color:#fff;box-shadow:0 0 12px rgba(59,130,246,.4)}
.stage.done .stage-dot{background:#10B981;color:#fff}

.stage-text{flex:1;min-width:0}
.stage-name{font-size:13px;font-weight:600;color:#CBD5E1;line-height:1.3}
.stage.active .stage-name{color:#F8FAFC}
.stage-meta{font-size:11px;color:#64748B;margin-top:2px}
.stage.active .stage-meta{color:#60A5FA}

/* Canvas — 50/50 split */
.canvas{flex:1;display:flex;flex-direction:column;min-width:0}
.canvas-top{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:0;padding:12px 20px}
.canvas-bottom{flex:1;display:flex;flex-direction:column;min-height:0;border-top:1px solid #334155}

.counter-bar{text-align:center;padding:0 0 8px;flex-shrink:0}
.counter-num{font-size:42px;font-weight:800;color:#3B82F6;line-height:1;transition:color .3s}
.counter-num.green{color:#10B981}
.counter-label{font-size:13px;color:#94A3B8;margin-top:2px}
.counter-sub{font-size:11px;color:#475569;margin-top:1px}

/* Block schematic */
.schematic{width:100%;max-width:550px;display:flex;flex-direction:column;gap:3px;transition:opacity .3s}

.section{border-radius:6px;padding:8px 14px;display:flex;align-items:center;justify-content:space-between;transition:all .5s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden}
.section .label{font-size:12px;font-weight:600;color:rgba(255,255,255,.9);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.section .sublabel{font-size:10px;color:rgba(255,255,255,.5);margin-top:1px}
.section .badge{font-family:'Menlo','Consolas',monospace;font-size:11px;font-weight:600;color:rgba(255,255,255,.7);background:rgba(0,0,0,.3);padding:2px 8px;border-radius:4px;white-space:nowrap;flex-shrink:0;margin-left:12px}

.section.dimmed{opacity:.2;transform:scale(.98)}
.section.highlighted{box-shadow:0 0 20px var(--glow-color);transform:scale(1.02);z-index:2}

/* Section colors */
.sec-header{background:#1E3A5F;--glow-color:rgba(59,130,246,.5)}
.sec-metadata{background:#312E81;--glow-color:rgba(139,92,246,.5)}
.sec-duration{background:#1E3A5F;--glow-color:rgba(59,130,246,.5)}
.sec-service{background:#134E3A;--glow-color:rgba(16,185,129,.5)}
.sec-status{background:#78350F;--glow-color:rgba(245,158,11,.5)}
.sec-more{background:#1E293B;border:1px solid #334155;--glow-color:rgba(100,116,139,.4)}

/* Internal structure (shown inside highlighted sections) */
.internal{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap}
.int-badge{font-size:10px;font-weight:700;color:#fff;padding:2px 8px;border-radius:4px;background:rgba(255,255,255,.15)}
.int-bar{height:8px;border-radius:4px;flex:1;min-width:40px}
.int-row{display:flex;align-items:center;gap:6px;width:100%}
.int-label{font-size:10px;color:rgba(255,255,255,.6);width:70px;flex-shrink:0}

/* Column entries inside metadata */
.col-entries{display:flex;flex-direction:column;gap:2px;margin-top:4px;width:100%}
.col-entry{font-size:10px;color:rgba(255,255,255,.5);font-family:'Menlo','Consolas',monospace;padding:1px 0}

/* Lazy decode overlay */
.skip-label{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:10px;font-weight:700;color:#64748B;letter-spacing:.05em;opacity:0;transition:opacity .3s}
.skip-label.visible{opacity:1}

/* Decoded indicator */
.section.decoded{box-shadow:0 0 20px rgba(16,185,129,.4);border:1px solid rgba(16,185,129,.4)}
.section.decoded .label{color:#10B981}

/* Coalesce visualization */
.coalesce-viz{width:100%;max-width:550px;display:flex;flex-direction:column;gap:16px;align-items:center}
.coalesce-row{display:flex;align-items:center;gap:4px;width:100%}
.coalesce-block{height:40px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:rgba(255,255,255,.8);flex:1}
.coalesce-gap{height:40px;border-radius:6px;background:repeating-linear-gradient(45deg,#1E293B,#1E293B 4px,#334155 4px,#334155 8px);flex:.3;display:flex;align-items:center;justify-content:center;font-size:9px;color:#64748B}
.coalesce-arrow{font-size:24px;color:#64748B;padding:4px 0}
.coalesce-merged{height:48px;border-radius:8px;background:linear-gradient(90deg,#1E3A5F 0%,#1E3A5F 30%,#134E3A 30%,#134E3A 35%,#312E81 35%,#312E81 65%,#78350F 65%,#78350F 70%,#134E3A 70%,#134E3A 100%);width:100%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;box-shadow:0 0 20px rgba(16,185,129,.3);border:1px solid rgba(16,185,129,.3)}
.coalesce-rule{font-size:10px;color:#64748B;text-align:center;font-family:'Menlo','Consolas',monospace}

/* Query overlay for lazy decode */
.query-overlay{font-family:'Menlo','Consolas',monospace;font-size:12px;color:#93C5FD;background:#0F172A;padding:6px 14px;border-radius:6px;border:1px solid #334155;margin-bottom:8px;text-align:center}

/* Detail panel */
.detail{flex:1;background:#1E293B;padding:20px 32px;overflow-y:auto}
.detail h3{font-size:15px;font-weight:700;color:#F8FAFC;margin-bottom:8px}
.detail p{font-size:13px;color:#94A3B8;line-height:1.65;max-width:800px}
.detail code{font-family:'Menlo','Consolas',monospace;font-size:12px;color:#93C5FD;background:#0F172A;padding:1px 5px;border-radius:3px}
.detail a{color:#60A5FA;text-decoration:none}
.detail a:hover{text-decoration:underline}
.detail .stat{display:inline-block;background:#0F172A;border:1px solid #334155;border-radius:6px;padding:3px 10px;font-size:12px;font-weight:600;color:#F59E0B;margin-right:8px;margin-top:6px}

/* Controls */
.controls{display:flex;justify-content:center;gap:10px;padding:12px;background:#0F172A;border-top:1px solid #1E293B;flex-shrink:0}
.btn{padding:8px 20px;border:1px solid #334155;border-radius:8px;background:#1E293B;color:#CBD5E1;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;font-family:inherit}
.btn:hover{background:#253347;border-color:#475569;color:#F8FAFC}
.btn:disabled{opacity:.3;cursor:not-allowed}
.btn.primary{background:#3B82F6;border-color:#3B82F6;color:#fff}
.btn.primary:hover{background:#2563EB}

/* Responsive */
@media(max-width:900px){
  .stages{width:220px}
  .bar .query-text{display:none}
}
@media(max-width:640px){
  .stages{display:none}
}
</style>
</head>
<body>

<div class="bar">
  <a href="/block-format">&larr; Back to docs</a>
  <div class="title">Block Format</div>
  <div class="query-text">~2000 spans &times; 40 columns &rarr; columnar block with lazy decode</div>
  <kbd>&larr; &rarr;</kbd>
</div>

<div class="main">
  <div class="stages">
    <div class="stages-title">Pipeline Stages</div>
    <div class="stages-list" id="stageList"></div>
  </div>
  <div class="canvas">
    <div class="canvas-top" id="canvasTop"></div>
    <div class="canvas-bottom">
      <div class="detail" id="detail"></div>
      <div class="controls">
        <button class="btn" id="prevBtn" onclick="go(-1)">&larr; Prev</button>
        <button class="btn" id="resetBtn" onclick="goTo(0)">Reset</button>
        <button class="btn primary" id="playBtn" onclick="togglePlay()">&#9654; Play</button>
        <button class="btn" id="nextBtn" onclick="go(1)">Next &rarr;</button>
      </div>
    </div>
  </div>
</div>

<script>
const STAGES = [
  {
    name: "Full Block", meta: "overview",
    title: "Block Overview",
    desc: `A block holds ~2,000 spans in hybrid row/column layout. Logically rows (spans), physically columns (one array per attribute). Read in a single I/O &mdash; never partial reads. Each block is self-contained: header, column metadata, then column data arrays packed sequentially.`,
    count: "~2000", label: "spans per block", sub: "",
    highlight: null, mode: "schematic"
  },
  {
    name: "Block Header", meta: "24 bytes",
    title: "Block Header",
    desc: `24 bytes: magic number (4), format version (4), span count (4), column count (4), reserved (8). Parsed first to determine how to read the rest. The magic number validates that we're reading a blockpack block, not garbage bytes.`,
    count: "24", label: "bytes", sub: "",
    highlight: "header", mode: "schematic"
  },
  {
    name: "Column Metadata", meta: "~40 columns",
    title: "Column Metadata Array",
    desc: `Per column: <code>name_length</code> (2) + <code>name</code> (var) + <code>column_type</code> (1) + <code>data_offset</code> (4) + <code>data_length</code> (4). Parsed to build the column index &mdash; enables random access to any column's data without scanning. This is what makes lazy column decode possible.`,
    count: "~40", label: "columns indexed", sub: "",
    highlight: "metadata", mode: "schematic"
  },
  {
    name: "Duration Column", meta: "DeltaUint64",
    title: "Column Data: span:duration",
    desc: `<code>span:duration</code> uses Delta Uint64 encoding. Timestamps are monotonic &rarr; small deltas &rarr; excellent compression. Presence bitmap: all 2,000 rows present &rarr; RLE compresses to 3 bytes. <span class="stat">4-8x compression</span>`,
    count: "Delta", label: "encoding", sub: "4-8x compression",
    highlight: "duration", mode: "schematic"
  },
  {
    name: "Service Name", meta: "Dictionary",
    title: "Column Data: resource.service.name",
    desc: `<code>resource.service.name</code> uses Dictionary encoding. 3 distinct values shared across 2,000 rows &rarr; dictionary = 3 strings + 2,000 &times; 2-byte indices. <span class="stat">10-100x compression</span> for low-cardinality columns.`,
    count: "Dict", label: "encoding", sub: "3 distinct values",
    highlight: "service", mode: "schematic"
  },
  {
    name: "Status Code", meta: "SparseDictionary",
    title: "Sparse Column: span.http.status_code",
    desc: `<code>span.http.status_code</code> is 60% null (not all spans are HTTP). Sparse Dictionary: presence bitmap marks 800 non-null rows &rarr; encode only 800 values. Null rows cost nearly zero. <span class="stat">sparse saves 60%</span>`,
    count: "40%", label: "fill rate", sub: "sparse encoding saves 60%",
    highlight: "status", mode: "schematic"
  },
  {
    name: "Lazy Decode", meta: "1 of 40 columns",
    title: "Lazy Column Decode",
    desc: `<code>parseBlockColumnsReuse</code> only decodes columns in <code>wantColumns</code>. A query for <code>span:duration > 5ms</code> decodes 1 of 40 columns. The other 39 register metadata but values stay compressed &mdash; zero CPU spent on columns the query never touches.`,
    count: "1", label: "column decoded", sub: "39 skipped",
    highlight: "lazy", mode: "schematic"
  },
  {
    name: "Coalesced Reads", meta: "3 blocks \u2192 1 I/O",
    title: "Coalesced Block Reads",
    desc: `Adjacent blocks merged into a single HTTP request. Gap &le; 4MB + waste &le; 100% + merged &le; 8MB &rarr; one round-trip instead of three. 3 &times; 50ms latency &rarr; 1 &times; 50ms. This is critical for object storage where request latency dominates cost. <span class="stat">3&times; fewer round-trips</span>`,
    count: "1", label: "I/O operation", sub: "3 blocks coalesced", green: true,
    highlight: null, mode: "coalesce"
  }
];

let cur = 0;
let playing = false;
let timer = null;

function init() {
  const list = document.getElementById('stageList');
  STAGES.forEach((s, i) => {
    const el = document.createElement('div');
    el.className = 'stage';
    el.innerHTML = `<div class="stage-dot">${i}</div><div class="stage-text"><div class="stage-name">${s.name}</div><div class="stage-meta">${s.meta}</div></div>`;
    el.onclick = () => goTo(i);
    list.appendChild(el);
  });
  render();
}

function buildSchematic(stage) {
  const hl = stage.highlight;
  const isLazy = hl === 'lazy';

  function cls(id) {
    if (!hl) return '';
    if (isLazy) {
      if (id === 'duration') return 'decoded';
      return 'dimmed';
    }
    return id === hl ? 'highlighted' : 'dimmed';
  }

  let headerInternal = '';
  if (hl === 'header') {
    headerInternal = `
      <div class="internal">
        <span class="int-badge" style="background:#2563EB">magic(4)</span>
        <span class="int-badge" style="background:#1D4ED8">version(4)</span>
        <span class="int-badge" style="background:#1E40AF">spans(4)</span>
        <span class="int-badge" style="background:#1E3A8A">cols(4)</span>
        <span class="int-badge" style="background:#172554">reserved(8)</span>
      </div>`;
  }

  let metaInternal = '';
  if (hl === 'metadata') {
    metaInternal = `
      <div class="col-entries">
        <div class="col-entry">col[0] span:duration &nbsp; Uint64 &nbsp; off:24 len:4820</div>
        <div class="col-entry">col[1] resource.service.name &nbsp; String &nbsp; off:4844 len:312</div>
        <div class="col-entry">col[2] span.http.status_code &nbsp; Int64 &nbsp; off:5156 len:2108</div>
        <div class="col-entry">col[3] span.kind &nbsp; Int64 &nbsp; off:7264 len:890</div>
        <div class="col-entry" style="color:rgba(255,255,255,.3)">... 36 more columns ...</div>
      </div>`;
  }

  let durationInternal = '';
  if (hl === 'duration') {
    durationInternal = `
      <div class="internal">
        <div class="int-row"><span class="int-label">encoding</span><span class="int-badge" style="background:#2563EB">DeltaUint64</span></div>
        <div class="int-row"><span class="int-label">presence</span><div class="int-bar" style="background:linear-gradient(90deg,#3B82F6,#2563EB);width:100%"></div><span style="font-size:10px;color:rgba(255,255,255,.5);margin-left:6px">RLE 3B</span></div>
        <div class="int-row"><span class="int-label">values</span><div class="int-bar" style="background:linear-gradient(90deg,#1E40AF,#1E3A8A);width:100%"></div></div>
      </div>`;
  }

  let serviceInternal = '';
  if (hl === 'service') {
    serviceInternal = `
      <div class="internal">
        <div class="int-row"><span class="int-label">encoding</span><span class="int-badge" style="background:#059669">Dictionary</span></div>
        <div class="int-row"><span class="int-label">dict</span>
          <span class="int-badge" style="background:#065F46">auth</span>
          <span class="int-badge" style="background:#065F46">web</span>
          <span class="int-badge" style="background:#065F46">api</span>
        </div>
        <div class="int-row"><span class="int-label">indices</span><div class="int-bar" style="background:linear-gradient(90deg,#10B981,#059669);width:100%"></div><span style="font-size:10px;color:rgba(255,255,255,.5);margin-left:6px">2000 &times; 2B</span></div>
      </div>`;
  }

  let statusInternal = '';
  if (hl === 'status') {
    statusInternal = `
      <div class="internal">
        <div class="int-row"><span class="int-label">encoding</span><span class="int-badge" style="background:#D97706">SparseDictionary</span></div>
        <div class="int-row"><span class="int-label">presence</span>
          <div style="display:flex;gap:1px;flex:1">
            <div class="int-bar" style="background:#F59E0B;flex:.4"></div>
            <div class="int-bar" style="background:#334155;flex:.15"></div>
            <div class="int-bar" style="background:#F59E0B;flex:.25"></div>
            <div class="int-bar" style="background:#334155;flex:.1"></div>
            <div class="int-bar" style="background:#F59E0B;flex:.1"></div>
          </div>
          <span style="font-size:10px;color:rgba(255,255,255,.5);margin-left:6px">800/2000</span>
        </div>
        <div class="int-row"><span class="int-label">values</span><div class="int-bar" style="background:linear-gradient(90deg,#F59E0B,#D97706);width:60%"></div></div>
      </div>`;
  }

  const skipDuration = isLazy ? '' : '<span class="skip-label">SKIP</span>';
  const skipService = isLazy ? '<span class="skip-label visible">SKIP</span>' : '<span class="skip-label">SKIP</span>';
  const skipStatus = isLazy ? '<span class="skip-label visible">SKIP</span>' : '<span class="skip-label">SKIP</span>';
  const skipMore = isLazy ? '<span class="skip-label visible">SKIP</span>' : '<span class="skip-label">SKIP</span>';

  const queryLine = isLazy ? '<div class="query-overlay">{ span:duration > 5ms }</div>' : '';

  return `
    ${queryLine}
    <div class="schematic">
      <div class="section sec-header ${cls('header')}" style="min-height:32px">
        <div style="flex:1;min-width:0">
          <div class="label">Block Header</div>
          ${headerInternal}
        </div>
        <div class="badge">24 B</div>
      </div>
      <div class="section sec-metadata ${cls('metadata')}" style="min-height:${hl === 'metadata' ? 100 : 52}px">
        <div style="flex:1;min-width:0">
          <div class="label">Column Metadata Array</div>
          <div class="sublabel">40 columns indexed</div>
          ${metaInternal}
        </div>
        <div class="badge">~480 B</div>
      </div>
      <div class="section sec-duration ${cls('duration')} ${isLazy ? 'decoded' : ''}" style="min-height:${hl === 'duration' ? 80 : 56}px">
        <div style="flex:1;min-width:0">
          <div class="label">Column Data[0]: span:duration</div>
          <div class="sublabel">DeltaUint64 + RLE presence</div>
          ${durationInternal}
        </div>
        <div class="badge">4.8 KB</div>
        ${skipDuration}
      </div>
      <div class="section sec-service ${cls('service')}" style="min-height:${hl === 'service' ? 80 : 56}px">
        <div style="flex:1;min-width:0">
          <div class="label">Column Data[1]: resource.service.name</div>
          <div class="sublabel">Dictionary + RLE presence</div>
          ${serviceInternal}
        </div>
        <div class="badge">312 B</div>
        ${skipService}
      </div>
      <div class="section sec-status ${cls('status')}" style="min-height:${hl === 'status' ? 80 : 48}px">
        <div style="flex:1;min-width:0">
          <div class="label">Column Data[2]: span.http.status_code</div>
          <div class="sublabel">SparseDictionary</div>
          ${statusInternal}
        </div>
        <div class="badge">2.1 KB</div>
        ${skipStatus}
      </div>
      <div class="section sec-more ${cls('more')}" style="min-height:36px">
        <div class="label" style="color:#64748B">... 37 more columns ...</div>
        <div class="badge" style="color:#475569">~82 KB</div>
        ${skipMore}
      </div>
    </div>`;
}

function buildCoalesce() {
  return `
    <div class="coalesce-viz">
      <div class="coalesce-row">
        <div class="coalesce-block" style="background:#1E3A5F;flex:1">blk-001</div>
        <div class="coalesce-gap">gap</div>
        <div class="coalesce-block" style="background:#134E3A;flex:1">blk-002</div>
        <div class="coalesce-gap">gap</div>
        <div class="coalesce-block" style="background:#78350F;flex:1">blk-003</div>
      </div>
      <div class="coalesce-rule">gap &le; 4MB &nbsp;&bull;&nbsp; waste &le; 100% &nbsp;&bull;&nbsp; merged &le; 8MB</div>
      <div class="coalesce-arrow">&darr; merge &darr;</div>
      <div class="coalesce-merged">Single HTTP GET &mdash; 1 round-trip</div>
    </div>`;
}

function render() {
  const s = STAGES[cur];

  // Stages sidebar
  document.querySelectorAll('.stage').forEach((el, i) => {
    el.className = 'stage';
    if (i < cur) el.classList.add('done');
    if (i === cur) el.classList.add('active');
  });

  // Canvas top
  const top = document.getElementById('canvasTop');
  let vizHTML = '';
  if (s.mode === 'coalesce') {
    vizHTML = `
      <div class="counter-bar">
        <div class="counter-num${s.green ? ' green' : ''}" id="counterNum">${s.count}</div>
        <div class="counter-label" id="counterLabel">${s.label}</div>
        <div class="counter-sub" id="counterSub">${s.sub}</div>
      </div>
      ${buildCoalesce()}`;
  } else {
    vizHTML = `
      <div class="counter-bar">
        <div class="counter-num${s.green ? ' green' : ''}" id="counterNum">${s.count}</div>
        <div class="counter-label" id="counterLabel">${s.label}</div>
        <div class="counter-sub" id="counterSub">${s.sub}</div>
      </div>
      ${buildSchematic(s)}`;
  }
  top.innerHTML = vizHTML;

  // Detail
  document.getElementById('detail').innerHTML = `<h3>${s.title}</h3><p>${s.desc}</p>`;

  // Buttons
  document.getElementById('prevBtn').disabled = cur === 0;
  document.getElementById('nextBtn').disabled = cur === STAGES.length - 1;

  // Scroll stage into view
  const active = document.querySelector('.stage.active');
  if (active) active.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
}

function goTo(i) { cur = Math.max(0, Math.min(i, STAGES.length - 1)); render(); }
function go(d) { goTo(cur + d); }

function togglePlay() {
  playing = !playing;
  const btn = document.getElementById('playBtn');
  if (playing) {
    btn.innerHTML = '&#9646;&#9646; Pause';
    tick();
  } else {
    btn.innerHTML = '&#9654; Play';
    clearTimeout(timer);
  }
}

function tick() {
  if (!playing) return;
  if (cur >= STAGES.length - 1) { togglePlay(); return; }
  go(1);
  timer = setTimeout(tick, 2400);
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); go(1); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); go(-1); }
  if (e.key === 'r') goTo(0);
});

init();
</script>
</body>
</html>
