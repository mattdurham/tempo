<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Block Scoring — Blockpack Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,'Segoe UI',sans-serif;background:#0F172A;color:#E2E8F0;overflow:hidden;height:100vh}

/* Top bar */
.bar{height:48px;background:#1E293B;border-bottom:1px solid #334155;display:flex;align-items:center;padding:0 24px;gap:16px}
.bar a{color:#94A3B8;text-decoration:none;font-size:13px;transition:color .15s}
.bar a:hover{color:#E2E8F0}
.bar .title{color:#F8FAFC;font-weight:700;font-size:15px;flex:1}
.bar .query-text{font-family:'Menlo','Consolas',monospace;font-size:12px;color:#93C5FD;background:#0F172A;padding:4px 12px;border-radius:6px;border:1px solid #334155;max-width:600px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar kbd{font-size:11px;color:#64748B;background:#0F172A;padding:2px 6px;border-radius:4px;border:1px solid #334155;font-family:inherit}

/* Main layout */
.main{display:flex;height:calc(100vh - 48px)}

/* Stages panel */
.stages{width:280px;background:#1E293B;border-right:1px solid #334155;display:flex;flex-direction:column}
.stages-title{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#64748B;padding:16px 20px 8px}
.stages-list{flex:1;overflow-y:auto;padding:0 0 12px}

.stage{display:flex;align-items:flex-start;gap:12px;padding:10px 20px;cursor:pointer;transition:background .2s;position:relative}
.stage:hover{background:#253347}
.stage.active{background:#1E3A5F}
.stage.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:#3B82F6;border-radius:0 2px 2px 0}

.stage-dot{width:28px;height:28px;border-radius:50%;background:#334155;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#94A3B8;flex-shrink:0;transition:all .3s}
.stage.active .stage-dot{background:#3B82F6;color:#fff;box-shadow:0 0 12px rgba(59,130,246,.4)}
.stage.done .stage-dot{background:#10B981;color:#fff}

.stage-text{flex:1;min-width:0}
.stage-name{font-size:13px;font-weight:600;color:#CBD5E1;line-height:1.3}
.stage.active .stage-name{color:#F8FAFC}
.stage-meta{font-size:11px;color:#64748B;margin-top:2px}
.stage.active .stage-meta{color:#60A5FA}

/* Canvas — 50/50 split */
.canvas{flex:1;display:flex;flex-direction:column;min-width:0}
.canvas-top{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;min-height:0;padding:16px 20px;overflow-y:auto}
.canvas-bottom{flex:1;display:flex;flex-direction:column;min-height:0;border-top:1px solid #334155}

.counter-bar{text-align:center;padding:0 0 12px;flex-shrink:0}
.counter-num{font-size:42px;font-weight:800;color:#3B82F6;line-height:1;transition:color .3s}
.counter-num.green{color:#10B981}
.counter-label{font-size:13px;color:#94A3B8;margin-top:2px}
.counter-sub{font-size:11px;color:#475569;margin-top:1px}

/* Block bars */
.block-list{display:flex;flex-direction:column;gap:6px;width:100%;max-width:540px;position:relative}

.block-bar{height:56px;background:#1E293B;border:1px solid #334155;border-radius:8px;display:flex;align-items:center;padding:0 14px;gap:10px;transition:all .6s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden}
.block-bar.eliminated{opacity:.15;transform:scale(.95);border-color:#475569}
.block-bar.fetched{border-color:#10B981;background:#0F2A1E}
.block-bar.dimmed{opacity:.35;border-style:dashed}
.block-bar.crossed-out{opacity:.2;border-style:dashed}
.block-bar.crossed-out::after{content:'';position:absolute;left:10px;right:10px;top:50%;height:2px;background:#EF4444;border-radius:1px}

.blk-name{font-family:'Menlo','Consolas',monospace;font-size:12px;font-weight:700;color:#CBD5E1;width:56px;flex-shrink:0;z-index:1}

.cms-bar-track{flex:1;height:20px;background:#0F172A;border-radius:4px;overflow:hidden;position:relative}
.cms-bar-fill{height:100%;border-radius:4px;transition:width .6s cubic-bezier(.4,0,.2,1);position:relative}
.cms-bar-fill.high{background:linear-gradient(90deg,#3B82F6,#60A5FA)}
.cms-bar-fill.med{background:linear-gradient(90deg,#F59E0B,#FBBF24)}
.cms-bar-fill.low{background:linear-gradient(90deg,#6366F1,#818CF8)}
.cms-bar-fill.zero{background:#334155}
.cms-label{position:absolute;right:6px;top:50%;transform:translateY(-50%);font-size:10px;font-weight:700;color:rgba(255,255,255,.85);z-index:1}

.hll-badge{width:32px;height:22px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;opacity:0;transition:opacity .4s}
.hll-badge.visible{opacity:1}
.hll-badge.green{background:#065F46;color:#6EE7B7;border:1px solid #10B981}
.hll-badge.amber{background:#78350F;color:#FCD34D;border:1px solid #F59E0B}
.hll-badge.red{background:#7F1D1D;color:#FCA5A5;border:1px solid #EF4444}

.score-num{font-family:'Menlo','Consolas',monospace;font-size:13px;font-weight:700;color:#F8FAFC;width:52px;text-align:right;flex-shrink:0;opacity:0;transition:opacity .4s}
.score-num.visible{opacity:1}

.fetch-badge{position:absolute;left:-2px;top:-2px;width:24px;height:24px;border-radius:50%;background:#3B82F6;color:#fff;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .3s;z-index:2}
.fetch-badge.visible{opacity:1}

.match-count{position:absolute;right:70px;top:50%;transform:translateY(-50%);font-size:11px;font-weight:600;color:#10B981;opacity:0;transition:opacity .3s;z-index:1}
.match-count.visible{opacity:1}

/* Detail panel */
.detail{flex:1;background:#1E293B;padding:20px 32px;overflow-y:auto}
.detail h3{font-size:15px;font-weight:700;color:#F8FAFC;margin-bottom:8px}
.detail p{font-size:13px;color:#94A3B8;line-height:1.65;max-width:800px}
.detail code{font-family:'Menlo','Consolas',monospace;font-size:12px;color:#93C5FD;background:#0F172A;padding:1px 5px;border-radius:3px}
.detail a{color:#60A5FA;text-decoration:none}
.detail a:hover{text-decoration:underline}
.detail .stat{display:inline-block;background:#0F172A;border:1px solid #334155;border-radius:6px;padding:3px 10px;font-size:12px;font-weight:600;color:#F59E0B;margin-right:8px;margin-top:6px}

/* Controls */
.controls{display:flex;justify-content:center;gap:10px;padding:12px;background:#0F172A;border-top:1px solid #1E293B;flex-shrink:0}
.btn{padding:8px 20px;border:1px solid #334155;border-radius:8px;background:#1E293B;color:#CBD5E1;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;font-family:inherit}
.btn:hover{background:#253347;border-color:#475569;color:#F8FAFC}
.btn:disabled{opacity:.3;cursor:not-allowed}
.btn.primary{background:#3B82F6;border-color:#3B82F6;color:#fff}
.btn.primary:hover{background:#2563EB}

/* Responsive */
@media(max-width:900px){
  .stages{width:220px}
  .bar .query-text{display:none}
}
@media(max-width:640px){
  .stages{display:none}
}
</style>
</head>
<body>

<div class="bar">
  <a href="/block-scoring">&larr; Back to docs</a>
  <div class="title">Block Scoring</div>
  <div class="query-text">{ span.service.name = "auth" &amp;&amp; duration &gt; 100ms } | limit=10</div>
  <kbd>&larr; &rarr;</kbd>
</div>

<div class="main">
  <div class="stages">
    <div class="stages-title">Pipeline Stages</div>
    <div class="stages-list" id="stageList"></div>
  </div>
  <div class="canvas">
    <div class="canvas-top">
      <div class="counter-bar">
        <div class="counter-num" id="counterNum">8</div>
        <div class="counter-label" id="counterLabel">candidate blocks</div>
        <div class="counter-sub" id="counterSub"></div>
      </div>
      <div class="block-list" id="blockList"></div>
    </div>
    <div class="canvas-bottom">
      <div class="detail" id="detail"></div>
      <div class="controls">
        <button class="btn" id="prevBtn" onclick="go(-1)">&larr; Prev</button>
        <button class="btn" id="resetBtn" onclick="goTo(0)">Reset</button>
        <button class="btn primary" id="playBtn" onclick="togglePlay()">&#9654; Play</button>
        <button class="btn" id="nextBtn" onclick="go(1)">Next &rarr;</button>
      </div>
    </div>
  </div>
</div>

<script>
const BLOCKS = [
  { id: 'blk-001', cms: 312, hll: 2, score: 156.0 },
  { id: 'blk-002', cms: 0,   hll: 5, score: 0 },
  { id: 'blk-003', cms: 420, hll: 1, score: 420.0 },
  { id: 'blk-004', cms: 85,  hll: 3, score: 28.3 },
  { id: 'blk-005', cms: 190, hll: 2, score: 95.0 },
  { id: 'blk-006', cms: 0,   hll: 8, score: 0 },
  { id: 'blk-007', cms: 55,  hll: 1, score: 55.0 },
  { id: 'blk-008', cms: 260, hll: 2, score: 130.0 }
];

const MAX_CMS = 420;

// Sorted order by score descending (excluding zeros)
const SCORED_ORDER = [2, 0, 7, 4, 3, 6]; // indices into BLOCKS
const ELIMINATED = [1, 5]; // blk-002, blk-006
// Fetch results: blk-003 = 7 matches, blk-001 = 3 matches
const FETCH_MATCHES = { 2: 7, 0: 3 };

const STAGES = [
  {
    name: 'Candidate Blocks', meta: '8 blocks',
    title: 'Candidate Blocks',
    desc: '8 blocks survived the pruning pipeline (bloom, KLL, CMS zero-check already removed obvious misses). These candidates need to be scored and prioritized before I/O.',
    count: 8, label: 'candidate blocks', sub: ''
  },
  {
    name: 'CMS Frequency', meta: 'estimate counts',
    title: '1. CMS Frequency Lookup',
    desc: 'Count-Min Sketch estimates how many times "auth" appears in each block. Higher frequency = more likely matches. Blocks with CMS=0 were already caught by zero-prune, but shown here for context.',
    count: 8, label: 'candidate blocks', sub: 'CMS estimates loaded'
  },
  {
    name: 'HLL Cardinality', meta: 'distinct values',
    title: '2. HLL Cardinality',
    desc: 'HyperLogLog estimates distinct values for <code>service.name</code> per block. Low cardinality = high selectivity. A block with HLL=1 means ONLY "auth" services \u2014 every span matches.',
    count: 8, label: 'candidate blocks', sub: 'cardinality assessed'
  },
  {
    name: 'Compute Score', meta: 'CMS / HLL',
    title: '3. Compute Score',
    desc: 'Score = CMS_frequency / max(HLL_cardinality, 1). High frequency + low cardinality = high selectivity. Blocks sorted by score descending.',
    count: 6, label: 'scored blocks', sub: '2 zero-score eliminated'
  },
  {
    name: 'Fetch Order', meta: 'prioritize I/O',
    title: '4. Fetch Order',
    desc: 'Blocks fetched in score order. Highest-scoring block first \u2014 most likely to contain dense matches. Each block read in a single I/O operation.',
    count: 6, label: 'scored blocks', sub: 'fetch order assigned'
  },
  {
    name: 'Early Termination', meta: 'limit reached',
    title: '5. Early Termination',
    desc: '<code>limit=10</code>: blk-003 returns 7 matching spans, blk-001 returns 3 more. Total = 10 = limit reached. STOP. Remaining 4 blocks are never fetched.',
    count: 10, label: 'matches found', sub: '2 of 6 blocks read', green: true
  },
  {
    name: 'I/O Savings', meta: 'final result',
    title: '6. I/O Savings',
    desc: 'Block scoring + early termination: only 2 I/O operations instead of 8 (or 100 without pruning). The scoring formula ensured the 2 richest blocks were read first.',
    count: 2, label: 'I/O operations', sub: '75% of candidates skipped', green: true
  }
];

let cur = 0;
let playing = false;
let timer = null;

function hllClass(v) { return v <= 2 ? 'green' : v <= 5 ? 'amber' : 'red'; }
function cmsClass(v) { return v === 0 ? 'zero' : v >= 300 ? 'high' : v >= 100 ? 'med' : 'low'; }

function init() {
  // Build stage list
  const list = document.getElementById('stageList');
  STAGES.forEach((s, i) => {
    const el = document.createElement('div');
    el.className = 'stage';
    el.innerHTML = `<div class="stage-dot">${i}</div><div class="stage-text"><div class="stage-name">${s.name}</div><div class="stage-meta">${s.meta}</div></div>`;
    el.onclick = () => goTo(i);
    list.appendChild(el);
  });

  // Build block bars
  const container = document.getElementById('blockList');
  BLOCKS.forEach((b, i) => {
    const el = document.createElement('div');
    el.className = 'block-bar';
    el.dataset.idx = i;
    el.innerHTML = `
      <div class="fetch-badge" data-role="fetch"></div>
      <div class="blk-name">${b.id}</div>
      <div class="cms-bar-track">
        <div class="cms-bar-fill ${cmsClass(b.cms)}" style="width:0%">
          <span class="cms-label" data-role="cms-label"></span>
        </div>
      </div>
      <div class="hll-badge ${hllClass(b.hll)}" data-role="hll">${b.hll}</div>
      <div class="score-num" data-role="score"></div>
      <div class="match-count" data-role="matches"></div>
    `;
    container.appendChild(el);
  });

  render();
}

function getDisplayOrder() {
  // Stages 0-2: original order
  if (cur < 3) return BLOCKS.map((_, i) => i);
  // Stage 3+: scored order, eliminated at bottom
  return [...SCORED_ORDER, ...ELIMINATED];
}

function render() {
  const s = STAGES[cur];

  // Stages sidebar
  document.querySelectorAll('.stage').forEach((el, i) => {
    el.className = 'stage';
    if (i < cur) el.classList.add('done');
    if (i === cur) el.classList.add('active');
  });

  // Reorder blocks with CSS transforms
  const container = document.getElementById('blockList');
  const bars = container.querySelectorAll('.block-bar');
  const order = getDisplayOrder();
  const slotHeight = 62; // 56px bar + 6px gap

  // Map each block index to its visual slot
  const slotOf = {};
  order.forEach((blockIdx, slot) => { slotOf[blockIdx] = slot; });

  bars.forEach(bar => {
    const idx = parseInt(bar.dataset.idx);
    const b = BLOCKS[idx];
    const slot = slotOf[idx];
    const originalSlot = idx;
    const offset = (slot - originalSlot) * slotHeight;

    bar.style.transform = `translateY(${offset}px)`;
    bar.style.order = slot;

    // Reset classes
    bar.className = 'block-bar';

    // CMS bar
    const fill = bar.querySelector('.cms-bar-fill');
    const cmsLabel = bar.querySelector('[data-role="cms-label"]');
    if (cur >= 1) {
      fill.style.width = (b.cms / MAX_CMS * 100) + '%';
      cmsLabel.textContent = b.cms;
    } else {
      fill.style.width = '0%';
      cmsLabel.textContent = '';
    }

    // HLL badge
    const hll = bar.querySelector('[data-role="hll"]');
    hll.className = `hll-badge ${hllClass(b.hll)}` + (cur >= 2 ? ' visible' : '');

    // Score
    const scoreEl = bar.querySelector('[data-role="score"]');
    if (cur >= 3 && b.score > 0) {
      scoreEl.textContent = b.score.toFixed(1);
      scoreEl.className = 'score-num visible';
    } else if (cur >= 3 && b.score === 0) {
      scoreEl.textContent = '0';
      scoreEl.className = 'score-num visible';
    } else {
      scoreEl.textContent = '';
      scoreEl.className = 'score-num';
    }

    // Eliminated blocks (score = 0)
    if (cur >= 3 && b.score === 0) {
      bar.classList.add('eliminated');
    }

    // Fetch badges (stage 4+)
    const fetchBadge = bar.querySelector('[data-role="fetch"]');
    if (cur >= 4 && SCORED_ORDER.includes(idx)) {
      const rank = SCORED_ORDER.indexOf(idx) + 1;
      fetchBadge.textContent = '#' + rank;
      fetchBadge.className = 'fetch-badge visible';
    } else {
      fetchBadge.className = 'fetch-badge';
    }

    // Match counts (stage 5)
    const matchEl = bar.querySelector('[data-role="matches"]');
    if (cur >= 5 && FETCH_MATCHES[idx] !== undefined) {
      matchEl.textContent = FETCH_MATCHES[idx] + ' matches';
      matchEl.className = 'match-count visible';
      bar.classList.add('fetched');
    } else {
      matchEl.className = 'match-count';
    }

    // Dim unread blocks at stage 5
    if (cur >= 5 && b.score > 0 && FETCH_MATCHES[idx] === undefined) {
      bar.classList.add('dimmed');
    }

    // Crossed out at stage 6
    if (cur >= 6 && (b.score === 0 || FETCH_MATCHES[idx] === undefined)) {
      bar.classList.remove('dimmed');
      bar.classList.remove('eliminated');
      bar.classList.add('crossed-out');
    }
  });

  // Counter
  const num = document.getElementById('counterNum');
  num.textContent = s.count;
  num.className = 'counter-num' + (s.green ? ' green' : '');
  document.getElementById('counterLabel').textContent = s.label;
  document.getElementById('counterSub').textContent = s.sub;

  // Detail
  document.getElementById('detail').innerHTML = `<h3>${s.title}</h3><p>${s.desc}</p>`;

  // Buttons
  document.getElementById('prevBtn').disabled = cur === 0;
  document.getElementById('nextBtn').disabled = cur === STAGES.length - 1;

  // Scroll stage into view
  const active = document.querySelector('.stage.active');
  if (active) active.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
}

function goTo(i) { cur = Math.max(0, Math.min(i, STAGES.length - 1)); render(); }
function go(d) { goTo(cur + d); }

function togglePlay() {
  playing = !playing;
  const btn = document.getElementById('playBtn');
  if (playing) {
    btn.innerHTML = '&#9646;&#9646; Pause';
    tick();
  } else {
    btn.innerHTML = '&#9654; Play';
    clearTimeout(timer);
  }
}

function tick() {
  if (!playing) return;
  if (cur >= STAGES.length - 1) { togglePlay(); return; }
  go(1);
  timer = setTimeout(tick, 2000);
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); go(1); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); go(-1); }
  if (e.key === 'r') goTo(0);
});

init();
</script>
</body>
</html>
