<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Write Pipeline — Blockpack Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,'Segoe UI',sans-serif;background:#0F172A;color:#E2E8F0;overflow:hidden;height:100vh}

/* Top bar */
.bar{height:48px;background:#1E293B;border-bottom:1px solid #334155;display:flex;align-items:center;padding:0 24px;gap:16px}
.bar a{color:#94A3B8;text-decoration:none;font-size:13px;transition:color .15s}
.bar a:hover{color:#E2E8F0}
.bar .title{color:#F8FAFC;font-weight:700;font-size:15px;flex:1}
.bar .query-text{font-family:'Menlo','Consolas',monospace;font-size:12px;color:#93C5FD;background:#0F172A;padding:4px 12px;border-radius:6px;border:1px solid #334155;max-width:600px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar kbd{font-size:11px;color:#64748B;background:#0F172A;padding:2px 6px;border-radius:4px;border:1px solid #334155;font-family:inherit}

/* Main layout */
.main{display:flex;height:calc(100vh - 48px)}

/* Stages panel */
.stages{width:280px;background:#1E293B;border-right:1px solid #334155;display:flex;flex-direction:column}
.stages-title{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#64748B;padding:16px 20px 8px}
.stages-list{flex:1;overflow-y:auto;padding:0 0 12px}

.stage{display:flex;align-items:flex-start;gap:12px;padding:10px 20px;cursor:pointer;transition:background .2s;position:relative}
.stage:hover{background:#253347}
.stage.active{background:#1E3A5F}
.stage.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:#3B82F6;border-radius:0 2px 2px 0}

.stage-dot{width:28px;height:28px;border-radius:50%;background:#334155;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#94A3B8;flex-shrink:0;transition:all .3s}
.stage.active .stage-dot{background:#3B82F6;color:#fff;box-shadow:0 0 12px rgba(59,130,246,.4)}
.stage.done .stage-dot{background:#10B981;color:#fff}

.stage-text{flex:1;min-width:0}
.stage-name{font-size:13px;font-weight:600;color:#CBD5E1;line-height:1.3}
.stage.active .stage-name{color:#F8FAFC}
.stage-meta{font-size:11px;color:#64748B;margin-top:2px}
.stage.active .stage-meta{color:#60A5FA}

/* Canvas — 50/50 split: viz top, explanation bottom */
.canvas{flex:1;display:flex;flex-direction:column;min-width:0}
.canvas-top{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:0;padding:12px 20px}
.canvas-bottom{flex:1;display:flex;flex-direction:column;min-height:0;border-top:1px solid #334155}

.counter-bar{text-align:center;padding:0 0 8px;flex-shrink:0}
.counter-num{font-size:42px;font-weight:800;color:#3B82F6;line-height:1;transition:color .3s}
.counter-num.green{color:#10B981}
.counter-label{font-size:13px;color:#94A3B8;margin-top:2px}
.counter-sub{font-size:11px;color:#475569;margin-top:1px}

.grid-area{display:flex;align-items:center;justify-content:center}

/* Span dots */
.span-grid{display:flex;flex-wrap:wrap;gap:3px;max-width:320px;justify-content:center}
.span{width:16px;height:16px;border-radius:3px;transition:all .5s cubic-bezier(.4,0,.2,1);flex-shrink:0}
.span.fingerprinted{outline:2px solid rgba(255,255,255,.7);outline-offset:0px}

/* Block groups */
.block-groups{display:flex;gap:20px;align-items:flex-start;justify-content:center;flex-wrap:wrap}
.block-group{background:rgba(255,255,255,.04);border:1px solid #334155;border-radius:8px;padding:12px 14px 10px;display:flex;flex-direction:column;align-items:center;gap:6px}
.block-group-label{font-size:11px;font-weight:700;color:#64748B;letter-spacing:.05em;text-transform:uppercase}
.block-group-dots{display:flex;flex-wrap:wrap;gap:3px;max-width:110px;justify-content:center}

/* Column encoding */
.block-encoded{background:rgba(255,255,255,.04);border:1px solid #334155;border-radius:8px;padding:12px 14px 10px;display:flex;flex-direction:column;align-items:center;gap:6px;min-width:90px}
.block-encoded-label{font-size:11px;font-weight:700;color:#64748B;letter-spacing:.05em;text-transform:uppercase}
.col-bars{display:flex;gap:3px;align-items:flex-end;height:72px}
.col-bar{width:10px;border-radius:3px 3px 0 0;transition:all .4s}

/* Sketch badges */
.sketch-row{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;margin-top:6px}
.sketch-badge{font-size:9px;font-weight:800;padding:3px 7px;border-radius:4px;letter-spacing:.03em}

/* KLL gradient */
.kll-container{width:100%;max-width:600px;display:flex;flex-direction:column;gap:8px;align-items:center}
.kll-bar{width:100%;height:48px;border-radius:6px;position:relative;overflow:hidden}
.kll-gradient{width:100%;height:100%;background:linear-gradient(90deg,#3B82F6,#10B981,#F59E0B,#EF4444)}
.kll-tick{position:absolute;top:0;bottom:0;width:1px;background:rgba(255,255,255,.35)}
.kll-labels{display:flex;justify-content:space-between;font-size:12px;color:#64748B;width:100%;padding:0 4px}

/* File layout */
.file-layout{display:flex;flex-direction:column;gap:3px;width:100%;max-width:540px}
.file-section{border-radius:4px;padding:8px 18px;font-size:12px;font-weight:600;display:flex;justify-content:space-between;align-items:center}
.file-section .sz{font-weight:400;opacity:.6;font-size:11px}

/* Detail panel — fills bottom half */
.detail{flex:1;background:#1E293B;padding:20px 32px;overflow-y:auto}
.detail h3{font-size:15px;font-weight:700;color:#F8FAFC;margin-bottom:8px}
.detail p{font-size:13px;color:#94A3B8;line-height:1.65;max-width:800px}
.detail code{font-family:'Menlo','Consolas',monospace;font-size:12px;color:#93C5FD;background:#0F172A;padding:1px 5px;border-radius:3px}
.detail a{color:#60A5FA;text-decoration:none}
.detail a:hover{text-decoration:underline}
.detail .stat{display:inline-block;background:#0F172A;border:1px solid #334155;border-radius:6px;padding:3px 10px;font-size:12px;font-weight:600;color:#F59E0B;margin-right:8px;margin-top:6px}

/* Controls — pinned at bottom of canvas-bottom */
.controls{display:flex;justify-content:center;gap:10px;padding:12px;background:#0F172A;border-top:1px solid #1E293B;flex-shrink:0}
.btn{padding:8px 20px;border:1px solid #334155;border-radius:8px;background:#1E293B;color:#CBD5E1;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;font-family:inherit}
.btn:hover{background:#253347;border-color:#475569;color:#F8FAFC}
.btn:disabled{opacity:.3;cursor:not-allowed}
.btn.primary{background:#3B82F6;border-color:#3B82F6;color:#fff}
.btn.primary:hover{background:#2563EB}

/* Responsive */
@media(max-width:900px){
  .stages{width:220px}
  .bar .query-text{display:none}
}
@media(max-width:640px){
  .stages{display:none}
}
</style>
</head>
<body>

<div class="bar">
  <a href="/write-path">&larr; Back to docs</a>
  <div class="title">Write Pipeline</div>
  <div class="query-text">AddTracesData(otlpBatch) &mdash; 80 spans, 4 services</div>
  <kbd>&larr; &rarr;</kbd>
</div>

<div class="main">
  <div class="stages">
    <div class="stages-title">Pipeline Stages</div>
    <div class="stages-list" id="stageList"></div>
  </div>
  <div class="canvas">
    <div class="canvas-top">
      <div class="counter-bar">
        <div class="counter-num" id="counterNum">80</div>
        <div class="counter-label" id="counterLabel">pending spans</div>
        <div class="counter-sub" id="counterSub"></div>
      </div>
      <div class="grid-area">
        <div id="vizArea"></div>
      </div>
    </div>
    <div class="canvas-bottom">
      <div class="detail" id="detail"></div>
      <div class="controls">
        <button class="btn" id="prevBtn" onclick="go(-1)">&larr; Prev</button>
        <button class="btn" id="resetBtn" onclick="goTo(0)">Reset</button>
        <button class="btn primary" id="playBtn" onclick="togglePlay()">&#9654; Play</button>
        <button class="btn" id="nextBtn" onclick="go(1)">Next &rarr;</button>
      </div>
    </div>
  </div>
</div>

<script>
const TOTAL = 80;
const SPANS_PER_SERVICE = 20;
const SERVICES = [
  { name: 'api-gateway',  color: '#3B82F6' },
  { name: 'auth-service', color: '#10B981' },
  { name: 'billing',      color: '#F59E0B' },
  { name: 'frontend',     color: '#EF4444' }
];

// Build span data: 20 per service, then shuffle
const spans = [];
for (let s = 0; s < 4; s++) {
  for (let i = 0; i < SPANS_PER_SERVICE; i++) {
    spans.push({ id: s * SPANS_PER_SERVICE + i, service: s });
  }
}

// Deterministic shuffle (seeded)
function seededShuffle(arr, seed) {
  const a = arr.slice();
  let s = seed;
  function rng() { s = (s * 1103515245 + 12345) & 0x7fffffff; return s / 0x7fffffff; }
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

const shuffledSpans = seededShuffle(spans, 42);
// Sorted order: by service ASC
const sortedSpans = spans.slice().sort((a, b) => a.service - b.service || a.id - b.id);
// Map from sorted position to shuffled position for CSS order
const shuffledOrder = shuffledSpans.map(sp => sp.id);
const sortedOrder = sortedSpans.map(sp => sp.id);

const STAGES = [
  {
    name: "Incoming Spans", meta: "80 spans",
    title: "0. Incoming Spans",
    desc: `80 OTLP spans arrive via <code>AddTracesData</code>. Each converted to a <code>pendingSpan</code> record (~88 bytes) with proto pointers and sort keys. No column decoding yet.`,
    count: 80, label: "pending spans", sub: "~7 KB total buffer"
  },
  {
    name: "MinHash Compute", meta: "fingerprinting",
    title: "1. MinHash Compute",
    desc: `MinHash signature computed per span: hash all key=value attribute pairs via FNV-1a, keep 4 smallest hashes as <code>[4]uint64</code> fingerprint. Similar attributes produce similar signatures.`,
    count: 80, label: "spans fingerprinted", sub: "4 hashes per span"
  },
  {
    name: "Sort", meta: "80 spans sorted",
    title: "2. Sort",
    desc: `Buffer sorted by <code>(service.name ASC, MinHashSig ASC, TraceID ASC)</code>. Spans from same service with similar attributes cluster together. Index-slice sort: O(n log n) comparisons, then O(n) copy pass.`,
    count: 80, label: "spans sorted", sub: ""
  },
  {
    name: "Block Batching", meta: "4 blocks",
    title: "3. Block Batching",
    desc: `Sorted buffer sliced into blocks of <code>MaxBlockSpans</code> (default 2,000; here 20). Each block gets sequential uint16 ID (0\u20133). Blocks written immediately to disk \u2014 streaming, not buffered.`,
    count: 4, label: "blocks formed", sub: "20 spans each"
  },
  {
    name: "Column Encoding", meta: "11 kinds",
    title: "4. Column Encoding",
    desc: `Each span decoded into typed column builders. Writer selects among 11 encoding kinds: Dictionary, Delta, RLE, XOR, Prefix Bytes, etc. Presence encoded via RLE bitset \u2014 sparse columns pay only for non-null rows.`,
    count: 11, label: "encoding kinds", sub: "auto-selected per column"
  },
  {
    name: "Sketch Building", meta: "5 per block",
    title: "5. Sketch Building",
    desc: `Per block: BinaryFuse8 bloom (~1 byte/distinct value), CMS frequency sketch (512 bytes), HLL cardinality (16 bytes), TopK-20 frequent values (~200 bytes). Per column: KLL sketch receives (min, max) for range index.`,
    count: 5, label: "sketches per block", sub: ""
  },
  {
    name: "KLL Boundaries", meta: "1000 buckets",
    title: "6. KLL Boundaries",
    desc: `<code>applyRangeBuckets</code> calls <code>Boundaries(1000)</code> on each column's KLL sketch \u2014 ~1,000 quantile bucket boundaries. Each block assigned to overlapping buckets \u2192 range index for query-time interval matching.`,
    count: 1000, label: "bucket boundaries", sub: "per range column"
  },
  {
    name: "File Finalization", meta: "1 file",
    title: "7. File Finalization",
    desc: `Metadata (snappy), file header (version, signal, offsets), compact trace index (TraceID\u2192blockIDs), intrinsic section (sorted columns + BlockRefs), file-level bloom (FBLM), footer V4.`,
    count: 1, label: "blockpack file", sub: "ready for queries", green: true
  }
];

let cur = 0;
let playing = false;
let timer = null;

function init() {
  const list = document.getElementById('stageList');
  STAGES.forEach((s, i) => {
    const el = document.createElement('div');
    el.className = 'stage';
    el.innerHTML = `<div class="stage-dot">${i}</div><div class="stage-text"><div class="stage-name">${s.name}</div><div class="stage-meta">${s.meta}</div></div>`;
    el.onclick = () => goTo(i);
    list.appendChild(el);
  });
  render();
}

function renderViz(stage) {
  const area = document.getElementById('vizArea');

  if (stage <= 2) {
    // Stages 0-2: span dot grid
    const isSorted = stage === 2;
    const isFingerprinted = stage >= 1;
    const order = isSorted ? sortedOrder : shuffledOrder;

    let html = '<div class="span-grid">';
    for (let i = 0; i < TOTAL; i++) {
      const sp = isSorted ? sortedSpans[i] : shuffledSpans[i];
      const cls = 'span' + (isFingerprinted ? ' fingerprinted' : '');
      html += `<div class="${cls}" style="background:${SERVICES[sp.service].color};order:${i}"></div>`;
    }
    html += '</div>';
    area.innerHTML = html;

  } else if (stage === 3) {
    // Stage 3: block groups with dividers
    let html = '<div class="block-groups">';
    for (let b = 0; b < 4; b++) {
      html += `<div class="block-group">`;
      html += `<div class="block-group-label">Block ${b}</div>`;
      html += `<div class="block-group-dots">`;
      for (let i = 0; i < SPANS_PER_SERVICE; i++) {
        const sp = sortedSpans[b * SPANS_PER_SERVICE + i];
        html += `<div class="span" style="background:${SERVICES[sp.service].color}"></div>`;
      }
      html += `</div></div>`;
    }
    html += '</div>';
    area.innerHTML = html;

  } else if (stage === 4) {
    // Stage 4: column encoding — thin vertical bars per block
    const colHeights = [
      [65, 48, 35, 58, 44],
      [58, 52, 40, 65, 35],
      [52, 44, 58, 48, 40],
      [70, 40, 52, 44, 58]
    ];
    const colColors = ['#3B82F6', '#10B981', '#F59E0B', '#A78BFA', '#EC4899'];
    let html = '<div class="block-groups">';
    for (let b = 0; b < 4; b++) {
      html += `<div class="block-encoded">`;
      html += `<div class="block-encoded-label">Block ${b}</div>`;
      html += `<div class="col-bars">`;
      for (let c = 0; c < 5; c++) {
        html += `<div class="col-bar" style="height:${colHeights[b][c]}px;background:${colColors[c]}"></div>`;
      }
      html += `</div></div>`;
    }
    html += '</div>';
    area.innerHTML = html;

  } else if (stage === 5) {
    // Stage 5: column bars + sketch badges
    const colHeights = [
      [65, 48, 35, 58, 44],
      [58, 52, 40, 65, 35],
      [52, 44, 58, 48, 40],
      [70, 40, 52, 44, 58]
    ];
    const colColors = ['#3B82F6', '#10B981', '#F59E0B', '#A78BFA', '#EC4899'];
    const badges = [
      { label: 'BF',   bg: '#1D4ED8', fg: '#93C5FD' },
      { label: 'CMS',  bg: '#6D28D9', fg: '#C4B5FD' },
      { label: 'HLL',  bg: '#065F46', fg: '#6EE7B7' },
      { label: 'TopK', bg: '#92400E', fg: '#FCD34D' },
      { label: 'KLL',  bg: '#991B1B', fg: '#FCA5A5' }
    ];
    let html = '<div class="block-groups">';
    for (let b = 0; b < 4; b++) {
      html += `<div class="block-encoded">`;
      html += `<div class="block-encoded-label">Block ${b}</div>`;
      html += `<div class="col-bars">`;
      for (let c = 0; c < 5; c++) {
        html += `<div class="col-bar" style="height:${colHeights[b][c]}px;background:${colColors[c]}"></div>`;
      }
      html += `</div>`;
      html += `<div class="sketch-row">`;
      for (const badge of badges) {
        html += `<div class="sketch-badge" style="background:${badge.bg};color:${badge.fg}">${badge.label}</div>`;
      }
      html += `</div></div>`;
    }
    html += '</div>';
    area.innerHTML = html;

  } else if (stage === 6) {
    // Stage 6: KLL gradient bar with tick marks
    let html = '<div class="kll-container">';
    html += '<div class="kll-bar"><div class="kll-gradient"></div>';
    // ~20 visible tick marks representing bucket boundaries
    for (let i = 1; i < 20; i++) {
      const pct = (i / 20) * 100;
      html += `<div class="kll-tick" style="left:${pct}%"></div>`;
    }
    html += '</div>';
    html += '<div class="kll-labels"><span>min</span><span>p25</span><span>p50</span><span>p75</span><span>max</span></div>';
    // Show block assignments as colored bars below
    html += '<div style="display:flex;gap:6px;width:100%;margin-top:10px">';
    for (let b = 0; b < 4; b++) {
      html += `<div style="flex:1;height:32px;border-radius:5px;background:${SERVICES[b].color};opacity:.7;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff">Block ${b}</div>`;
    }
    html += '</div>';
    html += '</div>';
    area.innerHTML = html;

  } else if (stage === 7) {
    // Stage 7: File layout schematic
    const sections = [
      { label: 'Header',            sz: '32 B',   bg: '#334155', fg: '#CBD5E1' },
      { label: 'Block 0 (encoded)', sz: '~1.2 KB', bg: '#3B82F6', fg: '#fff' },
      { label: 'Block 1 (encoded)', sz: '~1.1 KB', bg: '#10B981', fg: '#fff' },
      { label: 'Block 2 (encoded)', sz: '~1.3 KB', bg: '#F59E0B', fg: '#fff' },
      { label: 'Block 3 (encoded)', sz: '~1.0 KB', bg: '#EF4444', fg: '#fff' },
      { label: 'Trace Index',       sz: '~480 B',  bg: '#6D28D9', fg: '#E9D5FF' },
      { label: 'Intrinsic Section', sz: '~320 B',  bg: '#0E7490', fg: '#A5F3FC' },
      { label: 'Metadata (snappy)', sz: '~2.4 KB', bg: '#1E3A5F', fg: '#93C5FD' },
      { label: 'File Bloom (FBLM)', sz: '~64 B',   bg: '#065F46', fg: '#6EE7B7' },
      { label: 'Footer V4',         sz: '16 B',    bg: '#334155', fg: '#CBD5E1' }
    ];
    let html = '<div class="file-layout">';
    for (const sec of sections) {
      html += `<div class="file-section" style="background:${sec.bg};color:${sec.fg}"><span>${sec.label}</span><span class="sz">${sec.sz}</span></div>`;
    }
    html += '</div>';
    area.innerHTML = html;
  }
}

function render() {
  const s = STAGES[cur];

  // Stages sidebar
  document.querySelectorAll('.stage').forEach((el, i) => {
    el.className = 'stage';
    if (i < cur) el.classList.add('done');
    if (i === cur) el.classList.add('active');
  });

  // Counter
  const num = document.getElementById('counterNum');
  num.textContent = s.count;
  num.className = 'counter-num' + (s.green ? ' green' : '');
  document.getElementById('counterLabel').textContent = s.label;
  document.getElementById('counterSub').textContent = s.sub;

  // Visualization
  renderViz(cur);

  // Detail
  document.getElementById('detail').innerHTML = `<h3>${s.title}</h3><p>${s.desc}</p>`;

  // Buttons
  document.getElementById('prevBtn').disabled = cur === 0;
  document.getElementById('nextBtn').disabled = cur === STAGES.length - 1;

  // Scroll stage into view
  const active = document.querySelector('.stage.active');
  if (active) active.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
}

function goTo(i) { cur = Math.max(0, Math.min(i, STAGES.length - 1)); render(); }
function go(d) { goTo(cur + d); }

function togglePlay() {
  playing = !playing;
  const btn = document.getElementById('playBtn');
  if (playing) {
    btn.innerHTML = '&#9646;&#9646; Pause';
    tick();
  } else {
    btn.innerHTML = '&#9654; Play';
    clearTimeout(timer);
  }
}

function tick() {
  if (!playing) return;
  if (cur >= STAGES.length - 1) { togglePlay(); return; }
  go(1);
  timer = setTimeout(tick, 2000);
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); go(1); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); go(-1); }
  if (e.key === 'r') goTo(0);
});

init();
</script>
</body>
</html>
