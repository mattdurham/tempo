<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>KLL Quantile Sketch — Blockpack Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,'Segoe UI',sans-serif;background:#0F172A;color:#E2E8F0;overflow:hidden;height:100vh}

/* Top bar */
.bar{height:48px;background:#1E293B;border-bottom:1px solid #334155;display:flex;align-items:center;padding:0 24px;gap:16px}
.bar a{color:#94A3B8;text-decoration:none;font-size:13px;transition:color .15s}
.bar a:hover{color:#E2E8F0}
.bar .title{color:#F8FAFC;font-weight:700;font-size:15px;flex:1}
.bar .query-text{font-family:'Menlo','Consolas',monospace;font-size:12px;color:#93C5FD;background:#0F172A;padding:4px 12px;border-radius:6px;border:1px solid #334155;max-width:600px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar kbd{font-size:11px;color:#64748B;background:#0F172A;padding:2px 6px;border-radius:4px;border:1px solid #334155;font-family:inherit}

/* Main layout */
.main{display:flex;height:calc(100vh - 48px)}

/* Stages panel */
.stages{width:280px;background:#1E293B;border-right:1px solid #334155;display:flex;flex-direction:column}
.stages-title{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#64748B;padding:16px 20px 8px}
.stages-list{flex:1;overflow-y:auto;padding:0 0 12px}

.stage{display:flex;align-items:flex-start;gap:12px;padding:10px 20px;cursor:pointer;transition:background .2s;position:relative}
.stage:hover{background:#253347}
.stage.active{background:#1E3A5F}
.stage.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:#3B82F6;border-radius:0 2px 2px 0}

.stage-dot{width:28px;height:28px;border-radius:50%;background:#334155;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#94A3B8;flex-shrink:0;transition:all .3s}
.stage.active .stage-dot{background:#3B82F6;color:#fff;box-shadow:0 0 12px rgba(59,130,246,.4)}
.stage.done .stage-dot{background:#10B981;color:#fff}

.stage-text{flex:1;min-width:0}
.stage-name{font-size:13px;font-weight:600;color:#CBD5E1;line-height:1.3}
.stage.active .stage-name{color:#F8FAFC}
.stage-meta{font-size:11px;color:#64748B;margin-top:2px}
.stage.active .stage-meta{color:#60A5FA}

/* Canvas — 50/50 split: viz top, explanation bottom */
.canvas{flex:1;display:flex;flex-direction:column;min-width:0}
.canvas-top{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:0;padding:12px 20px}
.canvas-bottom{flex:1;display:flex;flex-direction:column;min-height:0;border-top:1px solid #334155}

.counter-bar{text-align:center;padding:0 0 8px;flex-shrink:0}
.counter-num{font-size:42px;font-weight:800;color:#3B82F6;line-height:1;transition:color .3s}
.counter-num.green{color:#10B981}
.counter-label{font-size:13px;color:#94A3B8;margin-top:2px}
.counter-sub{font-size:11px;color:#475569;margin-top:1px}

.grid-area{display:flex;align-items:center;justify-content:center}

/* KLL levels visualization */
.kll-container{display:flex;flex-direction:column;align-items:center;gap:8px}
.kll-level{display:flex;align-items:center;gap:12px}
.kll-label{width:28px;font-size:12px;font-weight:700;color:#64748B;text-align:right;flex-shrink:0}
.kll-cells{display:flex;gap:2px}
.kll-cell{width:16px;height:16px;border-radius:3px;background:#1E293B;border:1px solid #334155;transition:all .5s cubic-bezier(.4,0,.2,1)}
.kll-cell.blue{background:#3B82F6;border-color:#3B82F6;box-shadow:0 0 6px rgba(59,130,246,.3)}
.kll-cell.green{background:#10B981;border-color:#10B981;box-shadow:0 0 6px rgba(16,185,129,.3)}
.kll-cell.purple{background:#8B5CF6;border-color:#8B5CF6;box-shadow:0 0 6px rgba(139,92,246,.3)}
.kll-cell.amber{background:#F59E0B;border-color:#F59E0B;box-shadow:0 0 6px rgba(245,158,11,.3)}

/* CDF gradient bar */
.cdf-bar{width:100%;max-width:400px;height:18px;border-radius:5px;margin-top:12px;background:linear-gradient(to right,#3B82F6,#10B981,#EAB308,#EF4444);opacity:0;transition:opacity .5s}
.cdf-bar.visible{opacity:1}
.cdf-label{font-size:11px;color:#64748B;margin-top:4px;opacity:0;transition:opacity .5s;text-align:center}
.cdf-label.visible{opacity:1}

/* Bucket row for stage 7 */
.bucket-row{display:flex;gap:2px;justify-content:center;flex-wrap:wrap;max-width:440px;margin-top:6px;opacity:0;transition:opacity .5s}
.bucket-row.visible{opacity:1}
.bucket{width:18px;height:22px;border-radius:3px;position:relative;transition:all .4s}
.bucket.active{box-shadow:0 0 8px rgba(16,185,129,.4)}
.bucket-indicator{position:absolute;top:-6px;left:50%;transform:translateX(-50%);width:6px;height:6px;border-radius:50%;background:#F8FAFC;opacity:0;transition:opacity .3s}
.bucket.has-block .bucket-indicator{opacity:1}

/* Detail panel — fills bottom half */
.detail{flex:1;background:#1E293B;padding:20px 32px;overflow-y:auto}
.detail h3{font-size:15px;font-weight:700;color:#F8FAFC;margin-bottom:8px}
.detail p{font-size:13px;color:#94A3B8;line-height:1.65;max-width:800px}
.detail code{font-family:'Menlo','Consolas',monospace;font-size:12px;color:#93C5FD;background:#0F172A;padding:1px 5px;border-radius:3px}
.detail a{color:#60A5FA;text-decoration:none}
.detail a:hover{text-decoration:underline}
.detail .stat{display:inline-block;background:#0F172A;border:1px solid #334155;border-radius:6px;padding:3px 10px;font-size:12px;font-weight:600;color:#F59E0B;margin-right:8px;margin-top:6px}

/* Controls — pinned at bottom of canvas-bottom */
.controls{display:flex;justify-content:center;gap:10px;padding:12px;background:#0F172A;border-top:1px solid #1E293B;flex-shrink:0}
.btn{padding:8px 20px;border:1px solid #334155;border-radius:8px;background:#1E293B;color:#CBD5E1;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;font-family:inherit}
.btn:hover{background:#253347;border-color:#475569;color:#F8FAFC}
.btn:disabled{opacity:.3;cursor:not-allowed}
.btn.primary{background:#3B82F6;border-color:#3B82F6;color:#fff}
.btn.primary:hover{background:#2563EB}

/* Responsive */
@media(max-width:900px){
  .stages{width:220px}
  .bar .query-text{display:none}
  .kll-cell{width:14px;height:14px}
}
@media(max-width:640px){
  .stages{display:none}
  .kll-cell{width:12px;height:12px}
}
</style>
</head>
<body>

<div class="bar">
  <a href="/kll">&larr; Back to docs</a>
  <div class="title">KLL Quantile Sketch</div>
  <div class="query-text">Building range index boundaries for span:duration</div>
  <kbd>&larr; &rarr;</kbd>
</div>

<div class="main">
  <div class="stages">
    <div class="stages-title">Pipeline Stages</div>
    <div class="stages-list" id="stageList"></div>
  </div>
  <div class="canvas">
    <div class="canvas-top">
      <div class="counter-bar">
        <div class="counter-num" id="counterNum">0</div>
        <div class="counter-label" id="counterLabel">items in sketch</div>
        <div class="counter-sub" id="counterSub"></div>
      </div>
      <div class="grid-area">
        <div id="vizArea"></div>
      </div>
    </div>
    <div class="canvas-bottom">
      <div class="detail" id="detail"></div>
      <div class="controls">
        <button class="btn" id="prevBtn" onclick="go(-1)">&larr; Prev</button>
        <button class="btn" id="resetBtn" onclick="goTo(0)">Reset</button>
        <button class="btn primary" id="playBtn" onclick="togglePlay()">&#9654; Play</button>
        <button class="btn" id="nextBtn" onclick="go(1)">Next &rarr;</button>
      </div>
    </div>
  </div>
</div>

<script>
const LEVELS = [
  { name: 'L0', capacity: 20 },
  { name: 'L1', capacity: 14 },
  { name: 'L2', capacity: 10 },
  { name: 'L3', capacity: 7 },
  { name: 'L4', capacity: 5 }
];

const STAGES = [
  {
    name: "Empty Sketch", meta: "0 items",
    title: "Empty Sketch",
    desc: `KLL sketch with <code>k=200</code>, 5 levels. Capacity decreases at higher levels: <code>capacity(h) = max(M, floor(k * (2/3)^depth))</code>. Will process (min, max) values from each block.`,
    count: 0, label: "items in sketch", sub: "",
    levels: [{fill:0,color:''},{fill:0,color:''},{fill:0,color:''},{fill:0,color:''},{fill:0,color:''}],
    showCdf: false, showBuckets: false
  },
  {
    name: "Add Values", meta: "12 items",
    title: "Add Values",
    desc: `Block min/max values enter level 0. Each item represents a duration boundary from a block (e.g., 1.2ms, 3.4ms, 5.6ms...).`,
    count: 12, label: "items in sketch", sub: "L0 filling",
    levels: [{fill:12,color:'blue'},{fill:0,color:''},{fill:0,color:''},{fill:0,color:''},{fill:0,color:''}],
    showCdf: false, showBuckets: false
  },
  {
    name: "Level 0 Full", meta: "20 items",
    title: "Level 0 Full",
    desc: `Level 0 reaches capacity (20 items). Compaction triggers: sort, randomly halve, promote survivors.`,
    count: 20, label: "items in sketch", sub: "L0 at capacity",
    levels: [{fill:20,color:'blue'},{fill:0,color:''},{fill:0,color:''},{fill:0,color:''},{fill:0,color:''}],
    showCdf: false, showBuckets: false
  },
  {
    name: "Compact L0", meta: "10 in L1",
    title: "Compact L0 to L1",
    desc: `Random halving: sort L0, keep every other element starting at random offset. 10 survivors promoted to L1. Randomness ensures no systematic bias.`,
    count: 10, label: "items after compaction", sub: "L0 cleared, L1 has survivors",
    levels: [{fill:0,color:''},{fill:10,color:'green'},{fill:0,color:''},{fill:0,color:''},{fill:0,color:''}],
    showCdf: false, showBuckets: false
  },
  {
    name: "Continue Adding", meta: "25 items",
    title: "Continue Adding",
    desc: `More block boundaries arrive. L0 fills again while L1 holds compacted data.`,
    count: 25, label: "items in sketch", sub: "L0 refilling",
    levels: [{fill:15,color:'blue'},{fill:10,color:'green'},{fill:0,color:''},{fill:0,color:''},{fill:0,color:''}],
    showCdf: false, showBuckets: false
  },
  {
    name: "L1 Compacts", meta: "15 items",
    title: "L1 Compacts to L2",
    desc: `L1 overflows at 14, compacts to 7 survivors promoted to L2. Items at level h represent 2<sup>h</sup> original values.`,
    count: 15, label: "items in sketch", sub: "higher levels compress more",
    levels: [{fill:8,color:'blue'},{fill:0,color:''},{fill:7,color:'purple'},{fill:0,color:''},{fill:0,color:''}],
    showCdf: false, showBuckets: false
  },
  {
    name: "Extract Boundaries", meta: "merging levels",
    title: "Extract Boundaries",
    desc: `<code>Boundaries(1000)</code> merges all levels into sorted weighted sequence. Extracts 1,001 evenly-spaced quantile values. These become the range index bucket boundaries.`,
    count: 1001, label: "quantile boundaries", sub: "CDF extraction",
    levels: [{fill:8,color:'amber'},{fill:0,color:''},{fill:7,color:'amber'},{fill:0,color:''},{fill:0,color:''}],
    showCdf: true, showBuckets: false
  },
  {
    name: "Range Index", meta: "1000 buckets",
    title: "Range Index",
    desc: `Each block assigned to all buckets overlapping its [min, max]. Query-time interval matching: <code>duration > 5ms</code> &rarr; keep only blocks with buckets in [5ms, &infin;).`,
    count: 1000, label: "bucket boundaries", sub: "", green: true,
    levels: null,
    showCdf: false, showBuckets: true
  }
];

let cur = 0;
let playing = false;
let timer = null;

function init() {
  const list = document.getElementById('stageList');
  STAGES.forEach((s, i) => {
    const el = document.createElement('div');
    el.className = 'stage';
    el.innerHTML = `<div class="stage-dot">${i}</div><div class="stage-text"><div class="stage-name">${s.name}</div><div class="stage-meta">${s.meta}</div></div>`;
    el.onclick = () => goTo(i);
    list.appendChild(el);
  });
  render();
}

function buildLevelsHTML(levelData) {
  let html = '<div class="kll-container">';
  // Render from top (L4) to bottom (L0)
  for (let i = LEVELS.length - 1; i >= 0; i--) {
    const lv = LEVELS[i];
    const ld = levelData[i];
    html += `<div class="kll-level"><div class="kll-label">${lv.name}</div><div class="kll-cells">`;
    for (let c = 0; c < lv.capacity; c++) {
      const cls = c < ld.fill ? ld.color : '';
      html += `<div class="kll-cell ${cls}"></div>`;
    }
    html += '</div></div>';
  }
  html += '</div>';
  return html;
}

function buildBucketsHTML() {
  // 20 buckets with varying colors, some with block indicators
  const colors = ['#3B82F6','#3B82F6','#2563EB','#1D4ED8','#10B981','#10B981','#059669','#047857','#EAB308','#CA8A04','#F59E0B','#F59E0B','#EA580C','#DC2626','#EF4444','#EF4444','#DC2626','#B91C1C','#991B1B','#7F1D1D'];
  const blocksAt = [2,5,8,9,13,14,17]; // buckets that have block indicators
  let html = '<div class="kll-container">';
  html += '<div class="bucket-row visible">';
  for (let i = 0; i < 20; i++) {
    const hasBlock = blocksAt.includes(i);
    html += `<div class="bucket ${hasBlock ? 'has-block active' : ''}" style="background:${colors[i]};border:1px solid ${colors[i]}"><div class="bucket-indicator"></div></div>`;
  }
  html += '</div>';
  html += '<div style="display:flex;justify-content:space-between;max-width:520px;width:100%;margin-top:6px;font-size:10px;color:#64748B"><span>0ms</span><span>p25</span><span>p50</span><span>p75</span><span>max</span></div>';
  html += '</div>';
  return html;
}

function render() {
  const s = STAGES[cur];
  const isLast = cur === STAGES.length - 1;

  // Stages
  document.querySelectorAll('.stage').forEach((el, i) => {
    el.className = 'stage';
    if (i < cur) el.classList.add('done');
    if (i === cur) el.classList.add('active');
  });

  // Visualization
  const viz = document.getElementById('vizArea');
  let html = '';
  if (s.levels) {
    html = buildLevelsHTML(s.levels);
    if (s.showCdf) {
      html += '<div class="cdf-bar visible"></div>';
      html += '<div class="cdf-label visible">Cumulative Distribution Function &mdash; quantile boundaries extracted</div>';
    }
  } else if (s.showBuckets) {
    html = buildBucketsHTML();
  }
  viz.innerHTML = html;

  // Counter
  const num = document.getElementById('counterNum');
  num.textContent = s.count;
  num.className = 'counter-num' + (s.green ? ' green' : '');
  document.getElementById('counterLabel').textContent = s.label;
  document.getElementById('counterSub').textContent = s.sub;

  // Detail
  document.getElementById('detail').innerHTML = `<h3>${s.title}</h3><p>${s.desc}</p>`;

  // Buttons
  document.getElementById('prevBtn').disabled = cur === 0;
  document.getElementById('nextBtn').disabled = cur === STAGES.length - 1;

  // Scroll stage into view
  const active = document.querySelector('.stage.active');
  if (active) active.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
}

function goTo(i) { cur = Math.max(0, Math.min(i, STAGES.length - 1)); render(); }
function go(d) { goTo(cur + d); }

function togglePlay() {
  playing = !playing;
  const btn = document.getElementById('playBtn');
  if (playing) {
    btn.innerHTML = '&#9646;&#9646; Pause';
    tick();
  } else {
    btn.innerHTML = '&#9654; Play';
    clearTimeout(timer);
  }
}

function tick() {
  if (!playing) return;
  if (cur >= STAGES.length - 1) { togglePlay(); return; }
  go(1);
  timer = setTimeout(tick, 2200);
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); go(1); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); go(-1); }
  if (e.key === 'r') goTo(0);
});

init();
</script>
</body>
</html>
