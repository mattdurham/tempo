<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TopK — Blockpack Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,'Segoe UI',sans-serif;background:#0F172A;color:#E2E8F0;overflow:hidden;height:100vh}

/* Top bar */
.bar{height:48px;background:#1E293B;border-bottom:1px solid #334155;display:flex;align-items:center;padding:0 24px;gap:16px}
.bar a{color:#94A3B8;text-decoration:none;font-size:13px;transition:color .15s}
.bar a:hover{color:#E2E8F0}
.bar .title{color:#F8FAFC;font-weight:700;font-size:15px;flex:1}
.bar .query-text{font-family:'Menlo','Consolas',monospace;font-size:12px;color:#93C5FD;background:#0F172A;padding:4px 12px;border-radius:6px;border:1px solid #334155;max-width:600px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar kbd{font-size:11px;color:#64748B;background:#0F172A;padding:2px 6px;border-radius:4px;border:1px solid #334155;font-family:inherit}

/* Main layout */
.main{display:flex;height:calc(100vh - 48px)}

/* Stages panel */
.stages{width:280px;background:#1E293B;border-right:1px solid #334155;display:flex;flex-direction:column}
.stages-title{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#64748B;padding:16px 20px 8px}
.stages-list{flex:1;overflow-y:auto;padding:0 0 12px}

.stage{display:flex;align-items:flex-start;gap:12px;padding:10px 20px;cursor:pointer;transition:background .2s;position:relative}
.stage:hover{background:#253347}
.stage.active{background:#1E3A5F}
.stage.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:#3B82F6;border-radius:0 2px 2px 0}

.stage-dot{width:28px;height:28px;border-radius:50%;background:#334155;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#94A3B8;flex-shrink:0;transition:all .3s}
.stage.active .stage-dot{background:#3B82F6;color:#fff;box-shadow:0 0 12px rgba(59,130,246,.4)}
.stage.done .stage-dot{background:#10B981;color:#fff}

.stage-text{flex:1;min-width:0}
.stage-name{font-size:13px;font-weight:600;color:#CBD5E1;line-height:1.3}
.stage.active .stage-name{color:#F8FAFC}
.stage-meta{font-size:11px;color:#64748B;margin-top:2px}
.stage.active .stage-meta{color:#60A5FA}

/* Canvas — 50/50 split: viz top, explanation bottom */
.canvas{flex:1;display:flex;flex-direction:column;min-width:0}
.canvas-top{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:0;padding:12px 20px}
.canvas-bottom{flex:1;display:flex;flex-direction:column;min-height:0;border-top:1px solid #334155}

.counter-bar{text-align:center;padding:0 0 8px;flex-shrink:0}
.counter-num{font-size:42px;font-weight:800;color:#3B82F6;line-height:1;transition:color .3s}
.counter-num.green{color:#10B981}
.counter-label{font-size:13px;color:#94A3B8;margin-top:2px}
.counter-sub{font-size:11px;color:#475569;margin-top:1px}

.grid-area{display:flex;align-items:center;justify-content:center;overflow-y:auto}

/* Leaderboard */
.leaderboard{width:100%;max-width:480px;display:flex;flex-direction:column;gap:4px}
.lb-empty{text-align:center;color:#475569;font-size:14px;padding:40px 0}
.lb-empty .k-label{font-size:48px;font-weight:800;color:#334155;margin-bottom:8px}

.lb-entry{display:flex;align-items:center;gap:10px;padding:5px 10px;border-radius:6px;background:#1E293B;border:1px solid #334155;position:relative;overflow:hidden;transition:all .5s cubic-bezier(.4,0,.2,1)}
.lb-entry.green-entry{border-color:#10B981;background:#0F2922}
.lb-entry.dim{opacity:.35;transform:scale(.97)}

.lb-bg-bar{position:absolute;left:0;top:0;bottom:0;background:rgba(59,130,246,.1);border-radius:8px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.lb-entry.green-entry .lb-bg-bar{background:rgba(16,185,129,.1)}

.lb-rank{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0;z-index:1}
.lb-rank.gold{background:#F59E0B;color:#0F172A}
.lb-rank.silver{background:#94A3B8;color:#0F172A}
.lb-rank.bronze{background:#CD7F32;color:#0F172A}
.lb-rank.normal{background:#334155;color:#94A3B8}

.lb-value{flex:1;font-family:'Menlo','Consolas',monospace;font-size:11px;color:#E2E8F0;z-index:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lb-count{font-size:12px;font-weight:700;color:#3B82F6;z-index:1;white-space:nowrap}
.lb-entry.green-entry .lb-count{color:#10B981}

.lb-cutoff{display:flex;align-items:center;gap:8px;padding:4px 12px;color:#EF4444;font-size:11px;font-weight:600}
.lb-cutoff-line{flex:1;height:1px;background:#EF4444;opacity:.4}

/* Detail panel — fills bottom half */
.detail{flex:1;background:#1E293B;padding:20px 32px;overflow-y:auto}
.detail h3{font-size:15px;font-weight:700;color:#F8FAFC;margin-bottom:8px}
.detail p{font-size:13px;color:#94A3B8;line-height:1.65;max-width:800px}
.detail code{font-family:'Menlo','Consolas',monospace;font-size:12px;color:#93C5FD;background:#0F172A;padding:1px 5px;border-radius:3px}
.detail a{color:#60A5FA;text-decoration:none}
.detail a:hover{text-decoration:underline}
.detail .stat{display:inline-block;background:#0F172A;border:1px solid #334155;border-radius:6px;padding:3px 10px;font-size:12px;font-weight:600;color:#F59E0B;margin-right:8px;margin-top:6px}

/* Controls — pinned at bottom of canvas-bottom */
.controls{display:flex;justify-content:center;gap:10px;padding:12px;background:#0F172A;border-top:1px solid #1E293B;flex-shrink:0}
.btn{padding:8px 20px;border:1px solid #334155;border-radius:8px;background:#1E293B;color:#CBD5E1;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;font-family:inherit}
.btn:hover{background:#253347;border-color:#475569;color:#F8FAFC}
.btn:disabled{opacity:.3;cursor:not-allowed}
.btn.primary{background:#3B82F6;border-color:#3B82F6;color:#fff}
.btn.primary:hover{background:#2563EB}

/* Responsive */
@media(max-width:900px){
  .stages{width:220px}
  .leaderboard{max-width:440px}
  .bar .query-text{display:none}
}
@media(max-width:640px){
  .stages{display:none}
  .leaderboard{max-width:100%}
}
</style>
</head>
<body>

<div class="bar">
  <a href="/topk">&larr; Back to docs</a>
  <div class="title">TopK</div>
  <div class="query-text">Top-20 most frequent values per column per block</div>
  <kbd>&larr; &rarr;</kbd>
</div>

<div class="main">
  <div class="stages">
    <div class="stages-title">Pipeline Stages</div>
    <div class="stages-list" id="stageList"></div>
  </div>
  <div class="canvas">
    <div class="canvas-top">
      <div class="counter-bar">
        <div class="counter-num" id="counterNum">20</div>
        <div class="counter-label" id="counterLabel">max tracked values</div>
        <div class="counter-sub" id="counterSub"></div>
      </div>
      <div class="grid-area">
        <div id="vizArea" class="leaderboard"></div>
      </div>
    </div>
    <div class="canvas-bottom">
      <div class="detail" id="detail"></div>
      <div class="controls">
        <button class="btn" id="prevBtn" onclick="go(-1)">&larr; Prev</button>
        <button class="btn" id="resetBtn" onclick="goTo(0)">Reset</button>
        <button class="btn primary" id="playBtn" onclick="togglePlay()">&#9654; Play</button>
        <button class="btn" id="nextBtn" onclick="go(1)">Next &rarr;</button>
      </div>
    </div>
  </div>
</div>

<script>
// Leaderboard data for each stage
const LB_DATA = [
  // Stage 0: empty
  [],
  // Stage 1: initial 5 entries
  [
    {value: 'GET /api/health',       count: 8},
    {value: 'GET /api/users',        count: 5},
    {value: 'POST /api/login',       count: 3},
    {value: 'GET /api/status',       count: 2},
    {value: 'DELETE /api/session',   count: 1}
  ],
  // Stage 2: reordered after updates
  [
    {value: 'GET /api/users',        count: 15},
    {value: 'GET /api/health',       count: 8},
    {value: 'POST /api/login',       count: 7},
    {value: 'GET /api/status',       count: 4},
    {value: 'DELETE /api/session',   count: 2}
  ],
  // Stage 3: at capacity — 8 entries with cutoff
  [
    {value: 'GET /api/users',        count: 42},
    {value: 'POST /api/login',       count: 31},
    {value: 'GET /api/health',       count: 28},
    {value: 'GET /api/metrics',      count: 19},
    {value: 'PUT /api/profile',      count: 14},
    {value: 'GET /api/status',       count: 11},
    {value: 'POST /api/checkout',    count: 8,  dim: true},
    {value: 'DELETE /api/session',   count: 3,  dim: true}
  ],
  // Stage 4: final state — clean top entries
  [
    {value: 'GET /api/users',        count: 42},
    {value: 'POST /api/login',       count: 31},
    {value: 'GET /api/health',       count: 28},
    {value: 'GET /api/metrics',      count: 19},
    {value: 'PUT /api/profile',      count: 14},
    {value: 'GET /api/status',       count: 11}
  ],
  // Stage 5: in blockpack (green)
  [
    {value: 'GET /api/users',        count: 42, green: true},
    {value: 'POST /api/login',       count: 31, green: true},
    {value: 'GET /api/health',       count: 28, green: true},
    {value: 'GET /api/metrics',      count: 19, green: true},
    {value: 'PUT /api/profile',      count: 14, green: true},
    {value: 'GET /api/status',       count: 11, green: true}
  ]
];

const STAGES = [
  {
    name: "Empty Heap", meta: "K = 20",
    title: "Empty TopK Min-Heap",
    desc: `TopK maintains a min-heap of the 20 most frequent values per column per block. New values either create a heap entry or increment an existing one. When the heap reaches capacity, the least frequent entry is evicted to make room.`,
    count: 20, label: "max tracked values (K)", sub: "min-heap data structure",
    showCutoff: false
  },
  {
    name: "Add Values", meta: "5 entries",
    title: "1. First Values Added",
    desc: `Values from the <code>http.route</code> column are inserted. Each new value creates a heap entry with count 1; repeated values increment their counter. After processing initial spans: 5 distinct routes observed.`,
    count: 5, label: "values tracked", sub: "heap at 25% capacity",
    showCutoff: false
  },
  {
    name: "Update Frequencies", meta: "reorder",
    title: "2. Frequency Updates",
    desc: `<code>GET /api/users</code> surges to #1 with 10 more occurrences (total: 15). The heap automatically maintains sorted order. Values rise and fall as more spans are processed. <span class="stat">+10 hits for /api/users</span>`,
    count: 5, label: "values tracked", sub: "ranks reshuffled by frequency",
    showCutoff: false
  },
  {
    name: "At Capacity", meta: "eviction",
    title: "3. Heap at Capacity",
    desc: `When the heap reaches K=20 entries, the minimum-count entry is evicted to make room for any new value with a higher count. Entries below the cutoff line are candidates for eviction. The min-heap property ensures O(log K) insert and evict operations. <span class="stat">K = 20 cutoff</span>`,
    count: 8, label: "values shown (of K=20)", sub: "least frequent entries evicted",
    showCutoff: true
  },
  {
    name: "Final State", meta: "serialized",
    title: "4. Block Write Complete",
    desc: `Final TopK serialized per column per block at write time. Each entry stores: value (variable-length string) + count (varint). Typical overhead: ~200 bytes for 20 entries with short string values. <span class="stat">~200 bytes per column</span>`,
    count: 6, label: "top values in block", sub: "serialized at write time",
    showCutoff: false
  },
  {
    name: "In Blockpack", meta: "SearchTagValues",
    title: "5. TopK in Blockpack",
    desc: `Powers <code>SearchTagValues</code>: "what are the most common http.routes?" Top-20 from each block merged across all blocks for fast tag value discovery without full column scans. Drives Grafana autocomplete in the TraceQL query editor. <span class="stat">zero full-column scans</span>`,
    count: 20, label: "values tracked per column", sub: "merged across blocks for SearchTagValues", green: true,
    showCutoff: false
  }
];

let cur = 0;
let playing = false;
let timer = null;

function init() {
  const list = document.getElementById('stageList');
  STAGES.forEach((s, i) => {
    const el = document.createElement('div');
    el.className = 'stage';
    el.innerHTML = `<div class="stage-dot">${i}</div><div class="stage-text"><div class="stage-name">${s.name}</div><div class="stage-meta">${s.meta}</div></div>`;
    el.onclick = () => goTo(i);
    list.appendChild(el);
  });

  render();
}

function rankClass(i) {
  if (i === 0) return 'lb-rank gold';
  if (i === 1) return 'lb-rank silver';
  if (i === 2) return 'lb-rank bronze';
  return 'lb-rank normal';
}

function buildLeaderboard(stage) {
  const data = LB_DATA[stage];
  const s = STAGES[stage];

  if (data.length === 0) {
    return `<div class="lb-empty"><div class="k-label">K = 20</div>No values yet. Waiting for span data...</div>`;
  }

  const maxCount = data[0].count;
  let html = '';

  for (let i = 0; i < data.length; i++) {
    const d = data[i];
    const pct = Math.round((d.count / maxCount) * 100);
    let cls = 'lb-entry';
    if (d.green) cls += ' green-entry';
    if (d.dim) cls += ' dim';

    html += `<div class="${cls}">`;
    html += `<div class="lb-bg-bar" style="width:${pct}%"></div>`;
    html += `<div class="${rankClass(i)}">${i + 1}</div>`;
    html += `<div class="lb-value">${d.value}</div>`;
    html += `<div class="lb-count">${d.count}</div>`;
    html += `</div>`;

    // Insert cutoff line after entry 5 (index 5) in capacity stage
    if (s.showCutoff && i === 5) {
      html += `<div class="lb-cutoff"><div class="lb-cutoff-line"></div>K=20 cutoff (eviction zone)<div class="lb-cutoff-line"></div></div>`;
    }
  }

  return html;
}

function render() {
  const s = STAGES[cur];

  // Stages
  document.querySelectorAll('.stage').forEach((el, i) => {
    el.className = 'stage';
    if (i < cur) el.classList.add('done');
    if (i === cur) el.classList.add('active');
  });

  // Visualization
  document.getElementById('vizArea').innerHTML = buildLeaderboard(cur);

  // Counter
  const num = document.getElementById('counterNum');
  num.textContent = s.count;
  num.className = 'counter-num' + (s.green ? ' green' : '');
  document.getElementById('counterLabel').textContent = s.label;
  document.getElementById('counterSub').textContent = s.sub;

  // Detail
  document.getElementById('detail').innerHTML = `<h3>${s.title}</h3><p>${s.desc}</p>`;

  // Buttons
  document.getElementById('prevBtn').disabled = cur === 0;
  document.getElementById('nextBtn').disabled = cur === STAGES.length - 1;

  const active = document.querySelector('.stage.active');
  if (active) active.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
}

function goTo(i) { cur = Math.max(0, Math.min(i, STAGES.length - 1)); render(); }
function go(d) { goTo(cur + d); }

function togglePlay() {
  playing = !playing;
  const btn = document.getElementById('playBtn');
  if (playing) {
    btn.innerHTML = '&#9646;&#9646; Pause';
    tick();
  } else {
    btn.innerHTML = '&#9654; Play';
    clearTimeout(timer);
  }
}

function tick() {
  if (!playing) return;
  if (cur >= STAGES.length - 1) { togglePlay(); return; }
  go(1);
  timer = setTimeout(tick, 2200);
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); go(1); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); go(-1); }
  if (e.key === 'r') goTo(0);
});

init();
</script>
</body>
</html>
