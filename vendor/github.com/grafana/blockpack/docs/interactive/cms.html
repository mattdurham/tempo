<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Count-Min Sketch — Blockpack Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,'Segoe UI',sans-serif;background:#0F172A;color:#E2E8F0;overflow:hidden;height:100vh}

/* Top bar */
.bar{height:48px;background:#1E293B;border-bottom:1px solid #334155;display:flex;align-items:center;padding:0 24px;gap:16px}
.bar a{color:#94A3B8;text-decoration:none;font-size:13px;transition:color .15s}
.bar a:hover{color:#E2E8F0}
.bar .title{color:#F8FAFC;font-weight:700;font-size:15px;flex:1}
.bar .query-text{font-family:'Menlo','Consolas',monospace;font-size:12px;color:#93C5FD;background:#0F172A;padding:4px 12px;border-radius:6px;border:1px solid #334155;max-width:600px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar kbd{font-size:11px;color:#64748B;background:#0F172A;padding:2px 6px;border-radius:4px;border:1px solid #334155;font-family:inherit}

/* Main layout */
.main{display:flex;height:calc(100vh - 48px)}

/* Stages panel */
.stages{width:280px;background:#1E293B;border-right:1px solid #334155;display:flex;flex-direction:column}
.stages-title{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#64748B;padding:16px 20px 8px}
.stages-list{flex:1;overflow-y:auto;padding:0 0 12px}

.stage{display:flex;align-items:flex-start;gap:12px;padding:10px 20px;cursor:pointer;transition:background .2s;position:relative}
.stage:hover{background:#253347}
.stage.active{background:#1E3A5F}
.stage.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:#3B82F6;border-radius:0 2px 2px 0}

.stage-dot{width:28px;height:28px;border-radius:50%;background:#334155;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#94A3B8;flex-shrink:0;transition:all .3s}
.stage.active .stage-dot{background:#3B82F6;color:#fff;box-shadow:0 0 12px rgba(59,130,246,.4)}
.stage.done .stage-dot{background:#10B981;color:#fff}

.stage-text{flex:1;min-width:0}
.stage-name{font-size:13px;font-weight:600;color:#CBD5E1;line-height:1.3}
.stage.active .stage-name{color:#F8FAFC}
.stage-meta{font-size:11px;color:#64748B;margin-top:2px}
.stage.active .stage-meta{color:#60A5FA}

/* Canvas — 50/50 split: viz top, explanation bottom */
.canvas{flex:1;display:flex;flex-direction:column;min-width:0}
.canvas-top{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:0;padding:12px 20px}
.canvas-bottom{flex:1;display:flex;flex-direction:column;min-height:0;border-top:1px solid #334155}

.counter-bar{text-align:center;padding:0 0 8px;flex-shrink:0}
.counter-num{font-size:42px;font-weight:800;color:#3B82F6;line-height:1;transition:color .3s}
.counter-num.green{color:#10B981}
.counter-label{font-size:13px;color:#94A3B8;margin-top:2px}
.counter-sub{font-size:11px;color:#475569;margin-top:1px}

.grid-area{display:flex;align-items:center;justify-content:center}

/* CMS Grid */
.cms-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:4px}
.cms-cell{width:36px;height:28px;border-radius:5px;background:#1E293B;border:1px solid #334155;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#64748B;transition:all .5s cubic-bezier(.4,0,.2,1);position:relative}
.cms-cell.active{background:#3B82F6;border-color:#3B82F6;color:#fff}
.cms-cell.hot{background:#2563EB;border-color:#2563EB;color:#fff;box-shadow:0 0 12px rgba(59,130,246,.4)}
.cms-cell.bright{background:#1D4ED8;border-color:#1D4ED8;color:#fff;box-shadow:0 0 16px rgba(59,130,246,.6)}
.cms-cell.estimate{background:#10B981;border-color:#10B981;color:#fff;box-shadow:0 0 16px rgba(16,185,129,.5)}
.cms-cell.zero-est{background:#10B981;border-color:#10B981;color:#fff;box-shadow:0 0 12px rgba(16,185,129,.4)}

.cms-row-label{width:36px;height:28px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;color:#64748B;letter-spacing:.05em}

.cms-wrapper{display:flex;flex-direction:column;gap:4px}
.cms-row{display:flex;gap:4px;align-items:center}

/* Block mini-grid for stage 6 */
.mini-blocks{display:flex;gap:6px;margin-top:10px;justify-content:center}
.mini-block{width:40px;height:40px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;transition:all .5s cubic-bezier(.4,0,.2,1)}
.mini-block.kept{background:#10B981;color:#fff;box-shadow:0 0 12px rgba(16,185,129,.4)}
.mini-block.pruned{background:#1E293B;border:1px solid #334155;color:#475569;opacity:.4;transform:scale(.85)}

/* Detail panel — fills bottom half */
.detail{flex:1;background:#1E293B;padding:20px 32px;overflow-y:auto}
.detail h3{font-size:15px;font-weight:700;color:#F8FAFC;margin-bottom:8px}
.detail p{font-size:13px;color:#94A3B8;line-height:1.65;max-width:800px}
.detail code{font-family:'Menlo','Consolas',monospace;font-size:12px;color:#93C5FD;background:#0F172A;padding:1px 5px;border-radius:3px}
.detail a{color:#60A5FA;text-decoration:none}
.detail a:hover{text-decoration:underline}
.detail .stat{display:inline-block;background:#0F172A;border:1px solid #334155;border-radius:6px;padding:3px 10px;font-size:12px;font-weight:600;color:#F59E0B;margin-right:8px;margin-top:6px}

/* Controls — pinned at bottom of canvas-bottom */
.controls{display:flex;justify-content:center;gap:10px;padding:12px;background:#0F172A;border-top:1px solid #1E293B;flex-shrink:0}
.btn{padding:8px 20px;border:1px solid #334155;border-radius:8px;background:#1E293B;color:#CBD5E1;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;font-family:inherit}
.btn:hover{background:#253347;border-color:#475569;color:#F8FAFC}
.btn:disabled{opacity:.3;cursor:not-allowed}
.btn.primary{background:#3B82F6;border-color:#3B82F6;color:#fff}
.btn.primary:hover{background:#2563EB}

/* Responsive */
@media(max-width:900px){
  .stages{width:220px}
  .cms-cell{width:30px;height:24px;font-size:10px}
  .bar .query-text{display:none}
}
@media(max-width:640px){
  .stages{display:none}
  .cms-cell{width:28px;height:22px;font-size:9px}
}
</style>
</head>
<body>

<div class="bar">
  <a href="/cms">&larr; Back to docs</a>
  <div class="title">Count-Min Sketch</div>
  <div class="query-text">Frequency estimation for block-level zero-pruning</div>
  <kbd>&larr; &rarr;</kbd>
</div>

<div class="main">
  <div class="stages">
    <div class="stages-title">Pipeline Stages</div>
    <div class="stages-list" id="stageList"></div>
  </div>
  <div class="canvas">
    <div class="canvas-top">
      <div class="counter-bar">
        <div class="counter-num" id="counterNum">0</div>
        <div class="counter-label" id="counterLabel">total insertions</div>
        <div class="counter-sub" id="counterSub"></div>
      </div>
      <div class="grid-area">
        <div id="vizArea"></div>
      </div>
    </div>
    <div class="canvas-bottom">
      <div class="detail" id="detail"></div>
      <div class="controls">
        <button class="btn" id="prevBtn" onclick="go(-1)">&larr; Prev</button>
        <button class="btn" id="resetBtn" onclick="goTo(0)">Reset</button>
        <button class="btn primary" id="playBtn" onclick="togglePlay()">&#9654; Play</button>
        <button class="btn" id="nextBtn" onclick="go(1)">Next &rarr;</button>
      </div>
    </div>
  </div>
</div>

<script>
const ROWS = 4;
const COLS = 8;

// Hash positions for each value (row -> col)
const HASH_FRONTEND = [2, 5, 1, 6]; // row0-col2, row1-col5, row2-col1, row3-col6
const HASH_BACKEND  = [4, 5, 7, 3]; // row0-col4, row1-col5 (collision!), row2-col7, row3-col3
const HASH_UNKNOWN  = [0, 3, 6, 0]; // all zeros — never inserted

const STAGES = [
  {
    name: "Empty Sketch", meta: "4x8 grid",
    title: "Empty Count-Min Sketch",
    desc: `4 hash functions x 8 counter positions. Each row uses a different hash function. CMS provides frequency estimates: may overcount (hash collisions) but <strong>never undercounts</strong>.`,
    count: 0, label: "total insertions", sub: ""
  },
  {
    name: 'Add "frontend"', meta: "+1 insertion",
    title: '1. Insert "frontend"',
    desc: `Hash <code>"frontend"</code> with 4 hash functions to get 4 positions: row0-col2, row1-col5, row2-col1, row3-col6. Each counter incremented by 1.`,
    count: 1, label: "total insertions", sub: "4 counters updated"
  },
  {
    name: 'Add "backend"', meta: "collision!",
    title: '2. Insert "backend"',
    desc: `Hash <code>"backend"</code> to 4 positions: row0-col4, row1-col5, row2-col7, row3-col3. <strong>Hash collision:</strong> row1-col5 is shared with "frontend". Counter goes from 1 to 2. CMS overcounts due to collisions. <span class="stat">collision at row1-col5</span>`,
    count: 2, label: "total insertions", sub: "1 hash collision"
  },
  {
    name: 'Add "frontend" x2', meta: "+2 insertions",
    title: '3. Insert "frontend" Twice More',
    desc: `Same 4 positions as step 1 increment by 2. Counters for "frontend": row0-col2=3, row1-col5=4 (includes collision with "backend"), row2-col1=3, row3-col6=3. <span class="stat">true count: 3</span>`,
    count: 4, label: "total insertions", sub: '"frontend" added 3 times total'
  },
  {
    name: 'Estimate "frontend"', meta: "min = 3",
    title: '4. Estimate Frequency of "frontend"',
    desc: `Look up "frontend" counters: [3, 4, 3, 3]. Estimate = <code>min(3, 4, 3, 3) = 3</code>. Correct! The minimum across rows filters out the collision at row1-col5. CMS never undercounts, so estimate >= true count. <span class="stat">estimate: 3 = true count: 3</span>`,
    count: 3, label: "estimated frequency", sub: "min(3, 4, 3, 3) = 3"
  },
  {
    name: 'Estimate "unknown"', meta: "= 0",
    title: '5. Estimate Frequency of "unknown"',
    desc: `Look up "unknown" counters at row0-col0, row1-col3, row2-col6, row3-col0: all are <strong>0</strong>. CMS never undercounts, so frequency is definitively zero. This value was <strong>never added</strong> to this block. Safe to prune. <span class="stat">definitively absent</span>`,
    count: 0, label: "estimated frequency", sub: "all 4 counters = 0", green: true
  },
  {
    name: "Zero-Prune", meta: "block elimination",
    title: "6. Zero-Prune in Blockpack",
    desc: `In blockpack's query pipeline, CMS zero-estimate catches bloom filter false positives. A block that passed bloom but has CMS count = 0 for the queried value is safely eliminated. CMS adds ~32 bytes per column per block and provides a second line of defense after bloom filters. <span class="stat">0 false negatives guaranteed</span>`,
    count: 2, label: "blocks kept", sub: "3 of 5 blocks pruned by CMS", green: true
  }
];

// Grid state: 4 rows x 8 cols of counts
let grid = Array.from({length: ROWS}, () => new Array(COLS).fill(0));
// Highlight state
let highlights = Array.from({length: ROWS}, () => new Array(COLS).fill(''));

function computeGrid(stage) {
  const g = Array.from({length: ROWS}, () => new Array(COLS).fill(0));
  const h = Array.from({length: ROWS}, () => new Array(COLS).fill(''));

  if (stage >= 1) {
    // Add "frontend" once
    for (let r = 0; r < ROWS; r++) g[r][HASH_FRONTEND[r]] += 1;
  }
  if (stage >= 2) {
    // Add "backend" once
    for (let r = 0; r < ROWS; r++) g[r][HASH_BACKEND[r]] += 1;
  }
  if (stage >= 3) {
    // Add "frontend" twice more
    for (let r = 0; r < ROWS; r++) g[r][HASH_FRONTEND[r]] += 2;
  }

  // Highlights
  if (stage === 1) {
    for (let r = 0; r < ROWS; r++) h[r][HASH_FRONTEND[r]] = 'active';
  } else if (stage === 2) {
    for (let r = 0; r < ROWS; r++) h[r][HASH_BACKEND[r]] = 'active';
    // Mark collision cell as hot
    h[1][5] = 'hot';
  } else if (stage === 3) {
    for (let r = 0; r < ROWS; r++) {
      h[r][HASH_FRONTEND[r]] = 'active';
    }
    h[1][5] = 'hot'; // collision cell
  } else if (stage === 4) {
    // Estimate frontend: highlight in green
    for (let r = 0; r < ROWS; r++) h[r][HASH_FRONTEND[r]] = 'estimate';
    h[1][5] = 'hot'; // collision still visible
  } else if (stage === 5) {
    // Estimate unknown: highlight target cells in green
    for (let r = 0; r < ROWS; r++) h[r][HASH_UNKNOWN[r]] = 'zero-est';
  }

  return {g, h};
}

let cur = 0;
let playing = false;
let timer = null;

function init() {
  const list = document.getElementById('stageList');
  STAGES.forEach((s, i) => {
    const el = document.createElement('div');
    el.className = 'stage';
    el.innerHTML = `<div class="stage-dot">${i}</div><div class="stage-text"><div class="stage-name">${s.name}</div><div class="stage-meta">${s.meta}</div></div>`;
    el.onclick = () => goTo(i);
    list.appendChild(el);
  });

  render();
}

function buildCMSGrid(g, h) {
  const rowLabels = ['H1', 'H2', 'H3', 'H4'];
  let html = '<div class="cms-wrapper">';
  for (let r = 0; r < ROWS; r++) {
    html += '<div class="cms-row">';
    html += `<div class="cms-row-label">${rowLabels[r]}</div>`;
    for (let c = 0; c < COLS; c++) {
      const val = g[r][c];
      let cls = 'cms-cell';
      if (h[r][c]) cls += ' ' + h[r][c];
      else if (val > 0) {
        if (val >= 3) cls += ' bright';
        else if (val >= 1) cls += ' active';
      }
      html += `<div class="${cls}">${val}</div>`;
    }
    html += '</div>';
  }
  html += '</div>';
  return html;
}

function buildMiniBlocks() {
  const blocks = [
    {name: 'B0', kept: true},
    {name: 'B1', kept: false},
    {name: 'B2', kept: false},
    {name: 'B3', kept: true},
    {name: 'B4', kept: false}
  ];
  let html = '<div class="mini-blocks">';
  blocks.forEach(b => {
    const cls = b.kept ? 'mini-block kept' : 'mini-block pruned';
    const label = b.kept ? 'CMS > 0' : 'CMS = 0';
    html += `<div class="${cls}">${b.name}<br><span style="font-size:9px;font-weight:400">${label}</span></div>`;
  });
  html += '</div>';
  return html;
}

function render() {
  const s = STAGES[cur];
  const showMiniBlocks = cur === 6;

  // Stages
  document.querySelectorAll('.stage').forEach((el, i) => {
    el.className = 'stage';
    if (i < cur) el.classList.add('done');
    if (i === cur) el.classList.add('active');
  });

  // Visualization
  const vizArea = document.getElementById('vizArea');
  if (showMiniBlocks) {
    const {g, h} = computeGrid(3); // show final grid state
    vizArea.innerHTML = buildCMSGrid(g, h) + buildMiniBlocks();
  } else {
    const {g, h} = computeGrid(cur);
    vizArea.innerHTML = buildCMSGrid(g, h);
  }

  // Counter
  const num = document.getElementById('counterNum');
  num.textContent = s.count;
  num.className = 'counter-num' + (s.green ? ' green' : '');
  document.getElementById('counterLabel').textContent = s.label;
  document.getElementById('counterSub').textContent = s.sub;

  // Detail
  document.getElementById('detail').innerHTML = `<h3>${s.title}</h3><p>${s.desc}</p>`;

  // Buttons
  document.getElementById('prevBtn').disabled = cur === 0;
  document.getElementById('nextBtn').disabled = cur === STAGES.length - 1;

  // Scroll stage into view
  const active = document.querySelector('.stage.active');
  if (active) active.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
}

function goTo(i) { cur = Math.max(0, Math.min(i, STAGES.length - 1)); render(); }
function go(d) { goTo(cur + d); }

function togglePlay() {
  playing = !playing;
  const btn = document.getElementById('playBtn');
  if (playing) {
    btn.innerHTML = '&#9646;&#9646; Pause';
    tick();
  } else {
    btn.innerHTML = '&#9654; Play';
    clearTimeout(timer);
  }
}

function tick() {
  if (!playing) return;
  if (cur >= STAGES.length - 1) { togglePlay(); return; }
  go(1);
  timer = setTimeout(tick, 2200);
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); go(1); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); go(-1); }
  if (e.key === 'r') goTo(0);
});

init();
</script>
</body>
</html>
