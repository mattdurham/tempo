  lint:
    name: Lint (golangci-lint)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version: '1.26.x'

      - name: Install golangci-lint
        run: curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh | sh -s -- -b $(go env GOPATH)/bin v2.10.1

      - name: Run golangci-lint
        run: golangci-lint run --timeout=10m

  nilaway:
    name: Nil Safety (nilaway)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version: '1.26.x'

      - name: Install nilaway
        run: go install go.uber.org/nilaway/cmd/nilaway@latest

      - name: Run nilaway
        run: nilaway -include-pkgs "github.com/grafana/blockpack/..." -exclude-pkgs "github.com/grafana/blockpack/benchmark" ./...

  betteralign:
    name: Struct Alignment (betteralign)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version: '1.26.x'

      - name: Install betteralign
        run: go install github.com/dkorunic/betteralign/cmd/betteralign@latest

      - name: Check struct alignment
        run: |
          betteralign \
            -exclude_files "internal/xunsafe/any.go" \
            ./...

  test:
    name: Test with Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version: '1.26.x'

      - name: Run tests with coverage
        run: |
          # Exclude benchmark/comparison dirs and standalone CLI tools without tests.
          # Core library (internal/) and cmd/generate_unified_report are included.
          PKGS=$(go list ./... | grep -v -E '/benchmark|/real_world_comparison|/encodings|/parquet-util' \
            | grep -v -E '^github.com/grafana/blockpack/cmd/(analyze$|analyze-pb|benchsummary|codepath-dag|convert-parquet-folder|deep-compare|generate-synthetic-traces|generate-testdata|ingest-sorted|inspect-parquet-schema|inspect-web|measure_actual_distribution|pr-copilot-loop|temposerver|test_normalize|test_parse|trace_plan)$' \
            | grep -v -E '/executor/testutil$')
          go test $PKGS -coverprofile=coverage.out -covermode=atomic -timeout=10m

      - name: Run parity smoke test
        run: go test ./internal/parity -run TestParitySmokeTest -v

      - name: Run format comparison deep compare
        run: go test ./benchmark -run TestFormatComparisonDeepCompare -v -timeout 120s


      # Coverage threshold check disabled - new cmd packages added without tests
      # - name: Check coverage threshold
      #   run: |
      #     COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
      #     echo "Total coverage: ${COVERAGE}%"
      #     if [ $(echo "$COVERAGE < 70" | bc) -eq 1 ]; then
      #       echo "Coverage ${COVERAGE}% is below required 70%"
      #       exit 1
      #     fi
      #     echo "Coverage check passed: ${COVERAGE}% >= 70%"

  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version: '1.26.x'

      - name: Build
        run: go build ./...

  staticcheck:
    name: Static Analysis (staticcheck)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version: '1.26.x'

      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: Run staticcheck
        run: staticcheck -f stylish $(go list ./... | grep -v '/internal/xunsafe$')

  deadcode:
    name: Dead Code (deadcode)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version: '1.26.x'

      - name: Install deadcode
        run: go install golang.org/x/tools/cmd/deadcode@latest

      - name: Run deadcode
        run: |
          go build -o /dev/null ./cmd/deadcode
          # grep -v exits 1 when all lines are filtered (no output) — use || true so
          # set -e doesn't treat a clean result as a failure.
          output=$(deadcode -test ./... | grep -v "internal/xunsafe\|internal/debug\|benchmark/\|Writer.allocBytes\|internal/modules/blockio\|internal/tempoapi\|internal/blockio" || true)
          if [ -n "$output" ]; then
            echo "Dead code found:"
            echo "$output"
            exit 1
          fi

  benchmark:
    name: Benchmark
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout PR
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version: '1.26.x'

      - name: Install benchstat
        run: go install golang.org/x/perf/cmd/benchstat@v0.0.0-20260112171951-5abaabe9f1bd

      - name: Run benchmarks (PR branch)
        run: |
          set -o pipefail
          go test -bench=. -benchmem -count=1 -run='^$' -timeout=10m \
            ./internal/modules/executor \
            ./internal/modules/blockio/writer \
            | tee new.txt

      - name: Checkout main branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: main
          clean: false
          persist-credentials: false

      - name: Run benchmarks (main branch)
        run: |
          set -o pipefail
          go test -bench=. -benchmem -count=1 -run='^$' -timeout=10m \
            ./internal/modules/executor \
            ./internal/modules/blockio/writer \
            | tee old.txt

      - name: Compare with benchstat
        if: always()
        run: |
          benchstat old.txt new.txt | tee benchstat.txt || true

      - name: Check for regressions
        if: always()
        run: |
          if [ ! -s benchstat.txt ]; then
            echo "No benchstat output to check"
            exit 0
          fi

          # Only gate on B/op and allocs/op — these are deterministic and
          # don't vary with CPU speed or noisy CI neighbors.
          # sec/op is still shown in the PR comment for visibility.
          # With -count=1, benchstat shows exact percentage changes (no p-values needed
          # for deterministic metrics).
          REGRESSIONS=$(awk 'BEGIN { section="" }
            /│.*B\/op.*│/      { section="B/op" }
            /│.*allocs\/op.*│/ { section="allocs/op" }
            /│.*sec\/op.*│/    { section="sec/op" }
            section != "" && section != "sec/op" && /\+[0-9]+(\.[0-9]+)?%/ && !/^geomean/ { print }
          ' benchstat.txt | while IFS= read -r line; do
            pct=$(echo "$line" | grep -oP '\+\K[0-9]+(\.[0-9]+)?(?=%)')
            if [ -n "$pct" ]; then
              is_regressed=$(echo "$pct > 10.0" | bc -l)
              if [ "$is_regressed" -eq 1 ]; then
                echo "$line"
              fi
            fi
          done)

          if [ -n "$REGRESSIONS" ]; then
            echo "::error::Allocation regressions detected (>10% B/op or allocs/op):"
            echo "$REGRESSIONS"
            exit 1
          else
            echo "No allocation regressions detected (threshold: >10% B/op or allocs/op)"
          fi

      - name: Comment on PR
        if: always() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ ! -s benchstat.txt ]; then
            echo "No benchstat output to post"
            exit 0
          fi

          {
            echo '<details><summary>Benchmark comparison (main vs PR)</summary>'
            echo ''
            echo '```'
            cat benchstat.txt
            echo '```'
            echo ''
            echo '</details>'
          } > comment-body.txt

          # Delete previous benchmark comment if exists (filter by bot author)
          COMMENT_ID=$(gh api "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
            --jq '.[] | select(.user.login == "github-actions[bot]" and (.body | contains("Benchmark comparison"))) | .id' | head -1)
          if [ -n "$COMMENT_ID" ]; then
            gh api "repos/${{ github.repository }}/issues/comments/${COMMENT_ID}" -X DELETE || true
          fi

          gh pr comment "${{ github.event.pull_request.number }}" --body-file comment-body.txt
